<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>browser-node</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; background: #1e1e1e; color: #d4d4d4; font-family: 'Cascadia Code', 'Fira Code', monospace; }

      #app { display: grid; height: 100vh; grid-template-rows: 40px 1fr; grid-template-columns: 1fr 1fr; }

      #toolbar {
        grid-column: 1 / -1;
        background: #252526;
        border-bottom: 1px solid #3e3e42;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 12px;
      }
      #toolbar h1 { font-size: 13px; font-weight: 600; color: #cccccc; margin-right: auto; }
      button {
        font-size: 12px;
        padding: 4px 10px;
        background: #0e639c;
        color: #fff;
        border: none;
        border-radius: 3px;
        cursor: pointer;
      }
      button:hover { background: #1177bb; }
      button:disabled { background: #3e3e42; color: #888; cursor: default; }

      #left-pane {
        display: grid;
        grid-template-rows: 1fr 200px;
        border-right: 1px solid #3e3e42;
        overflow: hidden;
      }

      #editor {
        width: 100%;
        height: 100%;
        background: #1e1e1e;
        color: #d4d4d4;
        border: none;
        resize: none;
        padding: 12px;
        font-size: 13px;
        font-family: inherit;
        outline: none;
        tab-size: 2;
      }

      #terminal {
        background: #0d0d0d;
        border-top: 1px solid #3e3e42;
        padding: 8px 12px;
        font-size: 12px;
        overflow-y: auto;
        white-space: pre-wrap;
        word-break: break-all;
      }
      .log-line { line-height: 1.5; }
      .log-info  { color: #9cdcfe; }
      .log-ok    { color: #4ec9b0; }
      .log-warn  { color: #dcdcaa; }
      .log-error { color: #f44747; }
      .log-cmd   { color: #c586c0; }

      #right-pane { display: flex; flex-direction: column; overflow: hidden; }
      #preview-toolbar {
        background: #252526;
        border-bottom: 1px solid #3e3e42;
        padding: 4px 8px;
        font-size: 11px;
        color: #888;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      #preview-url { flex: 1; background: #1e1e1e; border: 1px solid #3e3e42; border-radius: 3px; padding: 2px 6px; color: #d4d4d4; font-size: 11px; }
      #preview {
        flex: 1;
        border: none;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="toolbar">
        <h1>⬡ browser-node</h1>
        <button id="btn-run">▶ Run</button>
        <button id="btn-install">⬇ npm install</button>
        <button id="btn-clear">✕ Clear</button>
        <span id="status" style="font-size:11px;color:#888;"></span>
      </div>

      <div id="left-pane">
        <textarea id="editor" spellcheck="false">// Example: simple Express-like server
const http = require('http');

const server = http.createServer((req, res) => {
  res.writeHead(200, { 'Content-Type': 'text/html' });
  res.end('<h1>Hello from browser-node!</h1><p>Running entirely in the browser.</p>');
});

server.listen(3000);
console.log('Server running at http://localhost:3000');
</textarea>
        <div id="terminal"></div>
      </div>

      <div id="right-pane">
        <div id="preview-toolbar">
          <span>Preview</span>
          <input id="preview-url" value="http://localhost:3000" readonly />
          <button id="btn-refresh" style="padding:2px 6px;font-size:11px;">↺</button>
        </div>
        <iframe id="preview" sandbox="allow-scripts allow-same-origin"></iframe>
      </div>
    </div>

    <script type="module" src="/src/shell/main.ts"></script>
  </body>
</html>

  <style>

  <script type="module">
    import * as duckdb from '@duckdb/duckdb-wasm';

    class DuckDBManager {
      constructor() {
        this.dbInstance = null;
        this.dbConnection = null;
      }
      async initialize() {
        if (this.dbInstance) return this.dbInstance;
        const JSDELIVR_BUNDLES = duckdb.getJsDelivrBundles();
        const bundle = await duckdb.selectBundle(JSDELIVR_BUNDLES);
        const worker_url = URL.createObjectURL(
          new Blob([`importScripts(\"${bundle.mainWorker}\");`], { type: 'text/javascript' })
        );
        const worker = new Worker(worker_url);
        const logger = new duckdb.ConsoleLogger();
        const db = new duckdb.AsyncDuckDB(logger, worker);
        await db.instantiate(bundle.mainModule, bundle.pthreadWorker);
        URL.revokeObjectURL(worker_url);
        this.dbInstance = db;
        this.dbConnection = await db.connect();
        return db;
      }
      async getConnection() {
        await this.initialize();
        return this.dbConnection;
      }
      async query(sql) {
        const connection = await this.getConnection();
        return connection.query(sql);
      }
    }
    const duckDBManager = new DuckDBManager();

    const DASHBOARD_CONFIG = {

        ],

        ]
      },
      filters: [

        { field: "Category", label: "Category", source: { table: "product", column: "Category" }, type: "select" }
      ],
      kpis: [
        {
          title: "Total Sales",
          query: "SELECT SUM(Sales) AS value FROM sales JOIN customer USING(\"Customer ID\") WHERE --filter:Region--",

        },

        }
      ],
      charts: [
        {
          id: "top10-bar",
          type: "bar",
          query: `SELECT c.Region || ' / ' || p.Category AS label, SUM(s.Sales) AS value
             FROM sales s JOIN customer c ON s.\"Customer ID\"=c.\"Customer ID\" JOIN product p ON s.\"Product ID\"=p.\"Product ID\"
             WHERE --filter:Region-- AND --filter:Category--
             GROUP BY c.Region, p.Category ORDER BY value DESC LIMIT 10`,
          options: { aspectRatio: 1.7, plugins: { legend: { display: false } } },
          section: "viz"
        },
        {
          id: "region-pie",
          type: "pie",
          query: "SELECT Region AS label, SUM(Sales) AS value FROM sales JOIN customer USING(\"Customer ID\") WHERE --filter:Region-- GROUP BY Region",
          options: { aspectRatio: 1.3, plugins: { legend: { position: 'bottom' } } },
          section: "viz"
        }
      ],
      tables: [
        {
          id: "combo-table",
          title: "Top Region/Category Combinations",
          query: `SELECT c.Region, p.Category, SUM(s.Sales) AS Sales
        FROM sales s JOIN customer c ON s.\"Customer ID\"=c.\"Customer ID\" JOIN product p ON s.\"Product ID\"=p.\"Product ID\"
        WHERE --filter:Region-- AND --filter:Category--
        GROUP BY c.Region, p.Category ORDER BY Sales DESC LIMIT 20` ,
          columns: ["Region", "Category", "Sales"]
        }
      ]
    };

    const toRows = result => typeof result?.toArray === "function" ? result.toArray() : result?.rows || result || [];
    const quoteIdent = name => `"${String(name).replaceAll('"', '""')}"`;
    const escapeSqlString = value => String(value).replaceAll("'", "''");
    const norm = value => String(value || '')
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')
      .toLowerCase()
      .replace(/[^a-z0-9]+/g, ' ')
      .trim();
    const compact = value => norm(value).replaceAll(' ', '');
    const singularize = value => String(value || '').replace(/ies$/i, 'y').replace(/s$/i, '');
    const isIdLike = name => /(^|\s|_|-)(id|key|code|postal|zip|row)(\s|_|-|$)/i.test(name) || / id$/i.test(name);
    const isNumericType = type => /int|double|float|decimal|numeric|real|hugeint|bigint|smallint|utinyint|uinteger/i.test(type || '');
    const isDateName = name => /date|time|month|year|timestamp/i.test(name || '');
    const numberValue = value => typeof value === 'bigint' ? Number(value) : Number(value || 0);
    const isoDate = date => date.toISOString().slice(0, 10);
    const asIsoDate = value => {
      if (!value) return null;
      if (value instanceof Date) return isoDate(value);
      if (typeof value === 'number') return isoDate(new Date(value));
      const s = String(value);
      const m = s.match(/\d{4}-\d{2}-\d{2}/);
      return m ? m[0] : null;
    };
    const addDays = (date, days) => new Date(Date.UTC(date.getUTCFullYear(), date.getUTCMonth(), date.getUTCDate() + days));
    const addMonths = (date, months) => new Date(Date.UTC(date.getUTCFullYear(), date.getUTCMonth() + months, 1));
    const startOfMonth = date => new Date(Date.UTC(date.getUTCFullYear(), date.getUTCMonth(), 1));
    const startOfYear = date => new Date(Date.UTC(date.getUTCFullYear(), 0, 1));

    function formatValue(value, format) {
      const n = numberValue(value);
      if (format === 'currency') return "$" + Math.round(n).toLocaleString();
      if (format === 'percent') return (n * 100).toFixed(1) + "%";
      if (Number.isFinite(n)) return n.toLocaleString();
      return String(value ?? '');
    }

    function fieldKey(table, column) {
      return `${table}::${column}`;
    }

    function safeAlias(tableName, index) {
      return `t${index}_${String(tableName).replace(/[^a-zA-Z0-9_]/g, '_')}`;
    }

    function detectDateFormat(samples) {
      const values = samples.map(String).filter(Boolean).slice(0, 200);
      if (!values.length) return null;
      const candidates = [
        { fmt: "%Y-%m-%d", re: /^(\d{4})-(\d{1,2})-(\d{1,2})$/, order: ['y', 'm', 'd'] },
        { fmt: "%d-%m-%Y", re: /^(\d{1,2})-(\d{1,2})-(\d{4})$/, order: ['d', 'm', 'y'] },
        { fmt: "%m-%d-%Y", re: /^(\d{1,2})-(\d{1,2})-(\d{4})$/, order: ['m', 'd', 'y'] },
        { fmt: "%d/%m/%Y", re: /^(\d{1,2})\/(\d{1,2})\/(\d{4})$/, order: ['d', 'm', 'y'] },
        { fmt: "%m/%d/%Y", re: /^(\d{1,2})\/(\d{1,2})\/(\d{4})$/, order: ['m', 'd', 'y'] },
        { fmt: "%Y/%m/%d", re: /^(\d{4})\/(\d{1,2})\/(\d{1,2})$/, order: ['y', 'm', 'd'] }
      ];
      let best = null;
      for (const c of candidates) {
        let score = 0;
        for (const value of values) {
          const m = value.match(c.re);
          if (!m) continue;
          const parts = Object.fromEntries(c.order.map((name, i) => [name, Number(m[i + 1])]));
          if (parts.y >= 1900 && parts.y <= 2200 && parts.m >= 1 && parts.m <= 12 && parts.d >= 1 && parts.d <= 31) score++;
        }
        if (!best || score > best.score) best = { format: c.fmt, score };
      }
      return best && best.score / values.length >= 0.6 ? best.format : null;
    }

    class AskDataEngine {
      constructor(config, duckDBManager) {
        this.config = config;
        this.askConfig = config.askData || {};
        this.duckDBManager = duckDBManager;
        this.catalog = [];
        this.fieldByKey = new Map();
        this.relationships = [];
        this.ambiguousRelationships = [];
        this.entities = [];
        this.fieldFuse = null;
        this.valueFuse = null;
        this.valueItems = [];
        this.locale = this.resolveLocale();
        this.localeFamily = this.locale.toLowerCase().startsWith('pt') ? 'pt' : 'en';
        this.vocabulary = this.buildVocabulary();
        this.chronoParser = this.localeFamily === 'pt' ? chronoPt : chronoEn;
        this.initialized = false;
      }

      resolveLocale() {
        const configured = this.askConfig.locale;
        const browserLocale = typeof navigator !== 'undefined' ? navigator.language : '';
        const locale = configured && configured !== 'auto' ? configured : browserLocale;
        return locale || this.askConfig.locales?.fallback || 'en-US';
      }

      buildVocabulary() {
        const defaults = {
          en: { by: ['by'], top: ['top', 'best', 'highest'], bottom: ['bottom', 'worst', 'lowest'], count: ['count', 'number of', 'how many'], overTime: ['over time', 'trend'], filters: ['in', 'for', 'where', 'with'], and: ['and'] },
          pt: { by: ['por'], top: ['top', 'maiores', 'melhores'], bottom: ['menores', 'piores'], count: ['contar', 'conte', 'quantos', 'numero de', 'número de'], overTime: ['ao longo do tempo', 'tendencia', 'tendência', 'evolucao', 'evolução'], filters: ['em', 'para', 'onde', 'com'], and: ['e'] }
        };
        const configured = this.askConfig.vocabulary || {};
        const merged = structuredClone(defaults);
        for (const [lang, groups] of Object.entries(configured)) {
          merged[lang] ||= {};
          for (const [group, terms] of Object.entries(groups)) merged[lang][group] = [...new Set([...(merged[lang][group] || []), ...terms])];
        }
        return merged;
      }

      terms(group) {
        return [...new Set([...(this.vocabulary.en?.[group] || []), ...(this.vocabulary[this.localeFamily]?.[group] || [])].map(norm).filter(Boolean))];
      }

      termAlternation(group) {
        return this.terms(group).sort((a, b) => b.length - a.length).map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&').replace(/\s+/g, '\\s+')).join('|');
      }

      hasTerm(q, group) {
        const alt = this.termAlternation(group);
        return !!alt && new RegExp(`\\b(?:${alt})\\b`).test(q);
      }

      localizedMapValue(map, fallback) {
        if (!map) return fallback;
        return map[this.locale] || map[this.localeFamily] || Object.entries(map).find(([key]) => key.toLowerCase().startsWith(this.localeFamily))?.[1] || fallback;
      }

      localizedTerms(item) {
        const localized = this.localizedMapValue(item.localizedSynonyms || item.localizedTerms, []);
        return Array.isArray(localized) ? localized : [];
      }

      displayLabel(item) {
        return this.localizedMapValue(item.labels, item.label || item.column || '');
      }

      async initialize() {
        if (this.initialized) return;
        console.info('[AskData] Building semantic catalog');
        await this.buildCatalog();
        this.buildFuseIndexes();
        this.initialized = true;
        console.info('[AskData] Ready', {
          fields: this.catalog.length,
          relationships: this.relationships,
          ambiguousRelationships: this.ambiguousRelationships
        });
      }

      async buildCatalog() {
        const overrides = new Map((this.askConfig.fields || []).map(f => [fieldKey(f.table, f.column), f]));
        const tableProfiles = new Map();
        const fields = [];

        for (const source of this.config.dataSources || []) {
          const table = source.name;
          const countRows = toRows(await this.duckDBManager.query(`SELECT COUNT(*) AS row_count FROM ${quoteIdent(table)}`));
          const rowCount = numberValue(countRows[0]?.row_count ?? countRows[0]?.rowCount ?? countRows[0]?.count_star ?? 0);
          tableProfiles.set(table, { rowCount });

          const schemaRows = toRows(await this.duckDBManager.query(`DESCRIBE SELECT * FROM ${quoteIdent(table)}`));
          for (const col of schemaRows) {
            const column = col.column_name || col.columnName || col.name;
            const type = col.column_type || col.columnType || col.type || '';
            if (!column) continue;
            const override = overrides.get(fieldKey(table, column)) || {};
            const sampleRows = toRows(await this.duckDBManager.query(`SELECT ${quoteIdent(column)} AS v FROM ${quoteIdent(table)} WHERE ${quoteIdent(column)} IS NOT NULL LIMIT ${this.askConfig.profiling?.maxSampleRows || 1000}`));
            const samples = sampleRows.map(r => r.v).filter(v => v !== null && v !== undefined);
            const distinctRows = toRows(await this.duckDBManager.query(`SELECT COUNT(DISTINCT ${quoteIdent(column)}) AS distinct_count FROM ${quoteIdent(table)}`));
            const cardinality = numberValue(distinctRows[0]?.distinct_count ?? 0);
            const nameLooksDate = isDateName(column);
            const parseFormat = override.parseFormat || (nameLooksDate ? detectDateFormat(samples) : null);
            let role = override.role;
            if (!role) {
              if (parseFormat || nameLooksDate) role = 'time';
              else if (isIdLike(column)) role = 'key';
              else if (isNumericType(type)) role = 'measure';
              else role = 'dimension';
            }
            const lowEnoughCardinality = cardinality <= (this.askConfig.profiling?.maxDistinctValuesPerField || 100);
            const sampleValues = (role === 'dimension' && lowEnoughCardinality)
              ? [...new Set(samples.map(String))].sort().slice(0, this.askConfig.profiling?.maxDistinctValuesPerField || 100)
              : [];
            const field = {
              id: fieldKey(table, column),
              table,
              column,
              type,
              role,
              label: override.label || column,
              labels: override.labels || {},
              aggregation: override.aggregation || (role === 'measure' ? 'SUM' : undefined),
              synonyms: override.synonyms || [],
              localizedSynonyms: override.localizedSynonyms || {},
              description: override.description || '',
              format: override.format,
              default: !!override.default,
              priority: override.priority || 0,
              parseFormat,
              sampleValues,
              samples: samples.slice(0, 100),
              dateProfile: null,
              cardinality,
              rowCount
            };
            if (field.role === 'time') field.dateProfile = await this.profileTimeField(field);
            fields.push(field);
            this.fieldByKey.set(field.id, field);
          }
        }

        this.catalog = fields;
        this.inferRelationships(fields, tableProfiles);
        this.buildEntities(fields);
      }

      async profileTimeField(field) {
        try {
          const expr = this.timeSqlExpression(field, quoteIdent(field.table));
          const sql = `SELECT MIN(CAST(${expr} AS DATE)) AS min_date, MAX(CAST(${expr} AS DATE)) AS max_date FROM ${quoteIdent(field.table)} WHERE ${expr} IS NOT NULL`;
          const row = toRows(await this.duckDBManager.query(sql))[0] || {};
          const minDate = asIsoDate(row.min_date);
          const maxDate = asIsoDate(row.max_date);
          if (!minDate || !maxDate) return null;
          const max = new Date(`${maxDate}T00:00:00Z`);
          const latestMonthStart = startOfMonth(max);
          const latestYearStart = startOfYear(max);
          return {
            minDate,
            maxDate,
            latestMonthStart: isoDate(latestMonthStart),
            latestMonthEnd: isoDate(addMonths(latestMonthStart, 1)),
            latestYearStart: isoDate(latestYearStart),
            latestYearEnd: isoDate(new Date(Date.UTC(latestYearStart.getUTCFullYear() + 1, 0, 1)))
          };
        } catch (err) {
          console.warn('[AskData] Failed to profile time field', field.id, err);
          return null;
        }
      }

      inferRelationships(fields, tableProfiles) {
        const explicit = this.config.relationships || this.askConfig.relationships || [];
        if (explicit.length) {
          this.relationships = explicit.map(r => ({ ...r, confidence: 1, inferred: false }));
          return;
        }
        if (this.askConfig.inferRelationships === false) return;

        const byColumn = new Map();
        for (const f of fields.filter(f => f.role === 'key' || isIdLike(f.column))) {
          const key = compact(f.column);
          if (!byColumn.has(key)) byColumn.set(key, []);
          byColumn.get(key).push(f);
        }

        const accepted = [];
        const ambiguous = [];
        for (const matches of byColumn.values()) {
          for (let i = 0; i < matches.length; i++) {
            for (let j = i + 1; j < matches.length; j++) {
              const a = matches[i], b = matches[j];
              if (a.table === b.table) continue;
              const overlap = this.sampleOverlap(a.samples, b.samples);
              const aUnique = a.cardinality / Math.max(1, a.rowCount);
              const bUnique = b.cardinality / Math.max(1, b.rowCount);
              const oneSideLookup = (aUnique > 0.75 && bUnique < 0.95) || (bUnique > 0.75 && aUnique < 0.95);
              let score = 0.45;
              if (/id$/i.test(norm(a.column).replaceAll(' ', ''))) score += 0.25;
              if (overlap > 0.2) score += 0.2;
              if (oneSideLookup) score += 0.1;
              const rel = {
                left: { table: a.table, column: a.column },
                right: { table: b.table, column: b.column },
                confidence: Number(score.toFixed(2)),
                inferred: true,
                overlap: Number(overlap.toFixed(2))
              };
              if (score >= (this.askConfig.relationshipInference?.autoAcceptThreshold || 0.85)) accepted.push(rel);
              else if (score >= (this.askConfig.relationshipInference?.ambiguousThreshold || 0.6)) ambiguous.push(rel);
            }
          }
        }
        this.relationships = accepted;
        this.ambiguousRelationships = ambiguous;
      }

      sampleOverlap(aValues, bValues) {
        const a = new Set(aValues.map(String));
        const b = new Set(bValues.map(String));
        if (!a.size || !b.size) return 0;
        let overlap = 0;
        for (const v of a) if (b.has(v)) overlap++;
        return overlap / Math.min(a.size, b.size);
      }

      buildEntities(fields) {
        const configured = this.askConfig.entities || [];
        const entities = configured.map(e => ({
          ...e,
          field: this.fieldByKey.get(fieldKey(e.table, e.key)),
          terms: [e.label, this.displayLabel(e), e.singular, ...(e.synonyms || []), ...this.localizedTerms(e)].filter(Boolean).map(norm)
        })).filter(e => e.field);

        for (const field of fields.filter(f => f.role === 'key' && / id$/i.test(f.column))) {
          const base = field.column.replace(/\s*ID$/i, '');
          if (!entities.some(e => e.table === field.table && e.key === field.column)) {
            entities.push({
              label: `${base}s`,
              singular: base,
              table: field.table,
              key: field.column,
              field,
              terms: [norm(base), norm(`${base}s`)]
            });
          }
        }
        for (const entity of entities) {
          const configured = (entity.preferredDimensions || [])
            .map(column => this.fieldByKey.get(fieldKey(entity.table, column)))
            .filter(Boolean);
          const inferred = fields
            .filter(f => f.table === entity.table && f.role === 'dimension')
            .sort((a, b) => (a.cardinality - b.cardinality) || ((b.priority || 0) - (a.priority || 0)));
          entity.preferredDimensionFields = configured.length ? configured : inferred;
        }
        this.entities = entities;
      }

      buildFuseIndexes() {
        const fieldItems = this.catalog.map(field => {
          const activeLabel = this.displayLabel(field);
          const activeSynonyms = this.localizedTerms(field);
          const allSynonyms = [...new Set([...(field.synonyms || []), ...Object.values(field.localizedSynonyms || {}).flat()])];
          return {
            field,
            text: [activeLabel, field.label, field.column, ...allSynonyms].join(' '),
            activeLabel,
            activeSynonyms,
            label: field.label,
            column: field.column,
            synonyms: field.synonyms || [],
            allSynonyms,
            role: field.role
          };
        });
        this.fieldFuse = new Fuse(fieldItems, {
          includeScore: true,
          threshold: 0.35,
          keys: [
            { name: 'activeLabel', weight: 0.45 },
            { name: 'activeSynonyms', weight: 0.45 },
            { name: 'label', weight: 0.3 },
            { name: 'column', weight: 0.3 },
            { name: 'synonyms', weight: 0.25 },
            { name: 'allSynonyms', weight: 0.2 },
            { name: 'text', weight: 0.1 }
          ]
        });

        this.valueItems = [];
        for (const field of this.catalog.filter(f => f.role === 'dimension')) {
          for (const value of field.sampleValues || []) {
            this.valueItems.push({ value, normalizedValue: norm(value), field });
          }
        }
        this.valueFuse = new Fuse(this.valueItems, {
          includeScore: true,
          threshold: 0.2,
          keys: ['value', 'normalizedValue']
        });
      }

      async ask(question) {
        await this.initialize();
        const parsed = this.parseQuestion(question);
        if (parsed.error) return parsed;
        if (parsed.clarification) return parsed;
        const planned = this.planSql(parsed.intent);
        if (planned.error) return planned;
        console.info('[AskData] SQL', planned.sql);
        const result = await this.duckDBManager.query(planned.sql);
        const rows = toRows(result).map(row => Object.fromEntries(Object.entries(row).map(([k, v]) => [k, typeof v === 'bigint' ? Number(v) : v])));
        const chartType = this.recommendChart(parsed.intent, rows);
        return {
          question,
          interpretation: this.describeIntent(parsed.intent),
          intent: parsed.intent,
          sql: planned.sql,
          rows,
          columns: rows.length ? Object.keys(rows[0]) : planned.columns,
          chartType,
          warnings: parsed.warnings || [],
          confidence: parsed.confidence || 0.85
        };
      }

      parseDateRange(question) {
        const timeField = this.getDefaultTimeField();
        if (!timeField) return { dateRange: null, questionWithoutDate: question };
        const relativePeriod = this.parseRelativePeriod(question, timeField);
        if (relativePeriod) return relativePeriod;
        const namedMonth = this.parseNamedMonth(question, timeField);
        if (namedMonth) return namedMonth;
        if (!this.chronoParser?.parse) return { dateRange: null, questionWithoutDate: question };
        const results = this.chronoParser.parse(question, new Date(), { forwardDate: false }) || [];
        let result = results.find(r => this.hasDateCue(r.text));
        if (!result) {
          const fallbackParser = this.localeFamily === 'pt' ? chronoEn : chronoPt;
          const fallbackResults = fallbackParser.parse(question, new Date(), { forwardDate: false }) || [];
          result = fallbackResults.find(r => this.hasDateCue(r.text) && !/^\d{1,2}[\/-]\d{1,2}(?:[\/-]\d{2,4})?$/.test(r.text.trim()));
        }
        if (!result) {
          const explicitYear = this.parseExplicitYear(question, timeField);
          return explicitYear || { dateRange: null, questionWithoutDate: question };
        }
        const range = this.resultToDateRange(result, timeField);
        if (!range) return { dateRange: null, questionWithoutDate: question };
        const questionWithoutDate = `${question.slice(0, result.index)} ${question.slice(result.index + result.text.length)}`.replace(/\s+/g, ' ').trim();
        return { dateRange: range, questionWithoutDate };
      }

      parseRelativePeriod(question, field) {
        const profile = field.dateProfile;
        const specs = [
          { re: /\b(latest year|last year|ano mais recente|ultimo ano|último ano|ano passado|ano anterior)\b/i, start: profile?.latestYearStart, end: profile?.latestYearEnd },
          { re: /\b(latest month|last month|mes mais recente|mês mais recente|ultimo mes|último mês|m[eê]s passado|m[eê]s anterior)\b/i, start: profile?.latestMonthStart, end: profile?.latestMonthEnd },
          { re: /\b(this year|este ano|esse ano)\b/i, calendar: 'year' },
          { re: /\b(this month|este m[eê]s|esse m[eê]s)\b/i, calendar: 'month' }
        ];
        for (const spec of specs) {
          const match = question.match(spec.re);
          if (!match) continue;
          let start = spec.start;
          let end = spec.end;
          if (spec.calendar === 'year') {
            const year = new Date().getFullYear();
            start = `${year}-01-01`;
            end = `${year + 1}-01-01`;
          } else if (spec.calendar === 'month') {
            const monthStart = new Date(Date.UTC(new Date().getFullYear(), new Date().getMonth(), 1));
            start = isoDate(monthStart);
            end = isoDate(addMonths(monthStart, 1));
          }
          if (!start || !end) return null;
          const questionWithoutDate = `${question.slice(0, match.index)} ${question.slice(match.index + match[0].length)}`.replace(/\s+/g, ' ').trim();
          return { dateRange: { field, start, end, text: match[0] }, questionWithoutDate };
        }
        return null;
      }

      monthNumber(name) {
        const months = {
          january: 1, jan: 1, janeiro: 1,
          february: 2, feb: 2, fevereiro: 2,
          march: 3, mar: 3, marco: 3, março: 3,
          april: 4, apr: 4, abril: 4,
          may: 5, maio: 5,
          june: 6, jun: 6, junho: 6,
          july: 7, jul: 7, julho: 7,
          august: 8, aug: 8, agosto: 8,
          september: 9, sep: 9, setembro: 9,
          october: 10, oct: 10, outubro: 10,
          november: 11, nov: 11, novembro: 11,
          december: 12, dec: 12, dezembro: 12
        };
        return months[norm(name)] || null;
      }

      parseNamedMonth(question, field) {
        const match = question.match(/\b(january|jan|february|feb|march|mar|april|apr|may|june|jun|july|jul|august|aug|september|sep|october|oct|november|nov|december|dec|janeiro|fevereiro|mar[cç]o|abril|maio|junho|julho|agosto|setembro|outubro|novembro|dezembro)\b(?:\s+((?:19|20)\d{2}))?/i);
        if (!match) return null;
        const month = this.monthNumber(match[1]);
        if (!month) return null;
        const questionWithoutDate = `${question.slice(0, match.index)} ${question.slice(match.index + match[0].length)}`.replace(/\s+/g, ' ').trim();
        if (match[2]) {
          const year = Number(match[2]);
          const start = isoDate(new Date(Date.UTC(year, month - 1, 1)));
          const end = isoDate(addMonths(new Date(Date.UTC(year, month - 1, 1)), 1));
          return { dateRange: { field, start, end, text: match[0] }, questionWithoutDate };
        }
        return { dateRange: { field, kind: 'monthOfYear', month, text: match[0] }, questionWithoutDate };
      }

      parseExplicitYear(question, field) {
        const match = question.match(/\b(?:in|em|no|na)?\s*((?:19|20)\d{2})\b/i);
        if (!match) return null;
        const year = Number(match[1]);
        const start = `${year}-01-01`;
        const end = `${year + 1}-01-01`;
        const questionWithoutDate = `${question.slice(0, match.index)} ${question.slice(match.index + match[0].length)}`.replace(/\s+/g, ' ').trim();
        return { dateRange: { field, start, end, text: match[0].trim() }, questionWithoutDate };
      }

      hasDateCue(text) {
        const t = norm(text);
        const cues = [
          'today', 'yesterday', 'tomorrow', 'last', 'this', 'next', 'year', 'month', 'week', 'quarter', 'day',
          'january', 'february', 'march', 'april', 'may', 'june', 'july', 'august', 'september', 'october', 'november', 'december',
          'hoje', 'ontem', 'amanha', 'amanhã', 'passado', 'passada', 'este', 'esta', 'proximo', 'próximo', 'ano', 'mes', 'mês', 'semana', 'trimestre', 'dia',
          'janeiro', 'fevereiro', 'marco', 'março', 'abril', 'maio', 'junho', 'julho', 'agosto', 'setembro', 'outubro', 'novembro', 'dezembro'
        ].map(norm);
        return cues.some(cue => new RegExp(`\\b${cue}\\b`).test(t)) || /^\d{4}$/.test(t) || /\d{1,2}[\/-]\d{1,2}(?:[\/-]\d{2,4})?/.test(text);
      }

      resultToDateRange(result, field) {
        const text = norm(result.text);
        const startDate = result.start?.date?.();
        if (!startDate || Number.isNaN(startDate.getTime())) return null;
        const startUtc = new Date(Date.UTC(startDate.getFullYear(), startDate.getMonth(), startDate.getDate()));
        let start = startUtc;
        let end = result.end?.date?.();
        if (end && !Number.isNaN(end.getTime())) end = addDays(new Date(Date.UTC(end.getFullYear(), end.getMonth(), end.getDate())), 1);

        const saysYear = /\b(year|ano)\b/.test(text) || (/^\d{4}$/.test(text));
        const saysMonth = /\b(month|mes|january|february|march|april|may|june|july|august|september|october|november|december|janeiro|fevereiro|marco|abril|maio|junho|julho|agosto|setembro|outubro|novembro|dezembro)\b/.test(text);
        const saysDay = /\b(day|dia|today|yesterday|tomorrow|hoje|ontem|amanha)\b/.test(text);

        if (!end) {
          if (saysYear && !saysMonth && !saysDay) {
            start = startOfYear(startUtc);
            end = new Date(Date.UTC(start.getUTCFullYear() + 1, 0, 1));
          } else if (saysMonth && !saysDay) {
            start = startOfMonth(startUtc);
            end = addMonths(start, 1);
          } else {
            end = addDays(startUtc, 1);
          }
        }
        return { field, start: isoDate(start), end: isoDate(end), text: result.text };
      }

      detectListField(q) {
        if (!/\b(which|what|list|show|quais|qual|liste|mostrar)\b/.test(q) && !/\b(kind|kinds|type|types|tipos?|categorias?)\b/.test(q)) return null;
        if (!/\b(do i have|are there|exist|available|tenho|existem|disponiveis|disponíveis)\b/.test(q) && !/\b(kind|kinds|type|types|tipos?|categorias?)\b/.test(q)) return null;

        if (/\b(categories|category|categorias?|categoria)\b/.test(q)) return this.resolveFieldPhrase('category', ['dimension']).field;
        if (/\b(sub categories|sub category|subcategory|subcategorias?|sub categoria)\b/.test(q)) return this.resolveFieldPhrase('sub category', ['dimension']).field;

        const entity = this.entities.find(e => e.terms.some(term => new RegExp(`\\b${term}\\b`).test(q)));
        if (/\b(kind|kinds|type|types|tipos?)\b/.test(q) && entity?.preferredDimensionFields?.length) return entity.preferredDimensionFields[0];
        if (entity) return entity.preferredDimensionFields?.find(f => /name|nome/i.test(f.column)) || entity.preferredDimensionFields?.[0];

        const phrase = q.match(/\b(?:which|what|list|show|quais|qual|liste|mostrar)\s+(.+?)(?:\s+(?:do i have|are there|exist|available|tenho|existem|disponiveis|disponíveis)|\?|$)/)?.[1];
        if (!phrase) return null;
        const cleaned = phrase.replace(/\b(of|de|do|da)\b.+$/i, '').replace(/\b(kind|kinds|type|types|tipos?)\b\s+(of|de)?/i, '').trim();
        return this.resolveFieldPhrase(cleaned, ['dimension']).field;
      }

      detectSuperlative(q) {
        const most = /\b(most|highest|largest|biggest|best|maior|maiores|melhor|melhores|mais)\b/.test(q);
        const least = /\b(least|lowest|smallest|worst|menor|menores|pior|piores|menos)\b/.test(q);
        if (!most && !least) return null;
        const metric = this.findBestFieldInText(q, 'measure') || this.getDefaultMetric();
        const patterns = [
          /\bwhich\s+(.+?)\s+has\s+(?:the\s+)?(?:most|highest|largest|biggest|best|least|lowest|smallest|worst)\b/,
          /\bqual\s+(.+?)\s+(?:tem|possui)\s+(?:o|a)?\s*(?:maior|menor|melhor|pior|mais|menos)\b/,
          /\b(?:most|highest|largest|biggest|best|least|lowest|smallest|worst)\s+.+?\s+(.+)$/,
          /\b(?:maior|menor|melhor|pior|mais|menos)\s+.+?\s+(?:por|de)\s+(.+)$/
        ];
        for (const pattern of patterns) {
          const phrase = q.match(pattern)?.[1];
          if (!phrase) continue;
          const field = this.resolveFieldPhrase(singularize(phrase), ['dimension']).field;
          if (field) return { field, metric, direction: least ? 'ASC' : 'DESC' };
        }
        return null;
      }

      isYearOverYear(q) {
        return /\b(year over year|yoy|year on year|ano a ano|ano contra ano)\b/.test(q);
      }

      parseQuestion(question) {
        const dateInfo = this.parseDateRange(question);
        const q = norm(dateInfo.questionWithoutDate || question);
        const warnings = [];
        if (!q) return { error: 'Ask a question first.' };
        const unsupportedMetric = this.detectUnsupportedMetric(q);
        if (unsupportedMetric) {
          const available = this.catalog.filter(f => f.role === 'measure').map(f => f.label).join(', ') || 'none';
          return {
            error: `I could not find a "${unsupportedMetric}" metric in this dataset. Available measures: ${available}.`,
            suggestions: this.catalog.filter(f => f.role === 'measure').slice(0, 4).map(f => question.replace(new RegExp(unsupportedMetric, 'ig'), f.label.toLowerCase()))
          };
        }

        const listField = this.detectListField(q);
        if (listField) {
          const filters = this.detectFilters(q, [listField]);
          if (filters.clarification) return filters;
          return {
            intent: {
              question,
              analysisType: 'list_values',
              metric: null,
              dimensions: [listField],
              filters: filters.filters,
              dateRange: dateInfo.dateRange,
              sort: { by: 'label', direction: 'ASC' },
              limit: this.askConfig.maxRows || 25
            },
            warnings,
            confidence: 0.88
          };
        }

        const topOrBottom = [this.termAlternation('top'), this.termAlternation('bottom')].filter(Boolean).join('|');
        const topMatch = topOrBottom ? q.match(new RegExp(`\\b(${topOrBottom})\\s+(\\d+)\\b`)) : null;
        const superlative = this.detectSuperlative(q);
        const limit = superlative ? 1 : (topMatch ? Math.min(Number(topMatch[2]), this.askConfig.maxRows || 25) : (this.askConfig.maxRows || 25));
        const sortDirection = superlative?.direction || (topMatch && this.terms('bottom').includes(norm(topMatch[1])) ? 'ASC' : 'DESC');
        const isRanking = !!topMatch || !!superlative;
        const isYoY = this.isYearOverYear(q);
        const timeGrain = isYoY ? 'year' : this.detectTimeGrain(q);
        const isCount = this.hasTerm(q, 'count');

        let metric = null;
        let countEntity = null;
        if (isCount) {
          countEntity = this.entities.find(entity => entity.terms.some(term => new RegExp(`\\b${term}\\b`).test(q)));
          metric = countEntity ? { kind: 'count_distinct', entity: countEntity, field: countEntity.field, label: countEntity.label } : { kind: 'count_star', label: 'Records' };
        } else {
          metric = superlative?.metric || this.findBestFieldInText(q, 'measure') || this.getDefaultMetric();
        }

        const dimensions = [];
        const topDimensionPhrase = superlative?.field ? null : this.extractTopDimensionPhrase(q);
        if (superlative?.field) dimensions.push(superlative.field);
        const byPhrases = this.extractByPhrases(q);
        if (topDimensionPhrase) {
          const field = this.resolveFieldPhrase(topDimensionPhrase, ['dimension', 'time']);
          if (field.clarification) return field;
          if (field.field) dimensions.push(field.field);
        }
        for (const phrase of byPhrases) {
          if (dimensions.length >= (this.askConfig.maxDimensions || 2)) break;
          if (['month', 'year', 'day', 'date', 'time'].includes(phrase) || /over time/.test(q)) continue;
          const field = this.resolveFieldPhrase(phrase, ['dimension', 'time']);
          if (field.clarification) return field;
          if (field.field && !dimensions.some(d => d.id === field.field.id)) dimensions.push(field.field);
        }
        if ((timeGrain || this.hasTerm(q, 'overTime')) && !dimensions.some(d => d.role === 'time')) {
          const timeField = this.getDefaultTimeField();
          if (timeField) dimensions.unshift(timeField);
          else warnings.push('I could not find a date/time field for a trend.');
        }
        if (!dimensions.length && isCount) {
          const byAfterCount = byPhrases[0];
          if (byAfterCount) {
            const field = this.resolveFieldPhrase(byAfterCount, ['dimension', 'time']);
            if (field.field) dimensions.push(field.field);
          }
        }

        const filters = this.detectFilters(q, dimensions);
        if (filters.clarification) return filters;

        return {
          intent: {
            question,
            analysisType: isYoY ? 'yoy' : (dimensions.some(d => d.role === 'time') ? 'trend' : (isRanking || dimensions.length ? 'ranking' : 'kpi')),
            metric,
            timeField: isYoY ? this.getDefaultTimeField() : null,
            dimensions: dimensions.slice(0, this.askConfig.maxDimensions || 2),
            filters: filters.filters,
            dateRange: dateInfo.dateRange,
            sort: { by: 'value', direction: sortDirection },
            limit,
            timeGrain: timeGrain || (dimensions.some(d => d.role === 'time') ? 'month' : undefined)
          },
          warnings,
          confidence: 0.86
        };
      }

      detectUnsupportedMetric(q) {
        const knownMetricTerms = new Set(this.catalog.filter(f => f.role === 'measure').flatMap(f => [f.label, f.column, ...(f.synonyms || []), ...this.localizedTerms(f)].map(norm)));
        for (const term of ['profit', 'margin', 'earnings', 'cost', 'lucro', 'margem', 'custo']) {
          if (new RegExp(`\\b${term}\\b`).test(q) && !knownMetricTerms.has(term)) return term;
        }
        return null;
      }

      detectTimeGrain(q) {
        if (/\b(day|daily|dia|diario|diaria)\b/.test(q)) return 'day';
        if (/\b(month|monthly|mes|mensal)\b/.test(q) || this.hasTerm(q, 'overTime')) return 'month';
        if (/\b(year|yearly|annual|ano|anual)\b/.test(q)) return 'year';
        return null;
      }

      extractTopDimensionPhrase(q) {
        const topOrBottom = [this.termAlternation('top'), this.termAlternation('bottom')].filter(Boolean).join('|');
        const by = this.termAlternation('by');
        if (!topOrBottom || !by) return null;
        const m = q.match(new RegExp(`\\b(?:${topOrBottom})\\s+\\d+\\s+(.+?)\\s+(?:${by})\\s+`));
        return m ? singularize(m[1].replace(new RegExp(`\\b(?:${by}|${this.termAlternation('filters')})\\b.*$`), '').trim()) : null;
      }

      extractByPhrases(q) {
        const by = this.termAlternation('by');
        if (!by) return [];
        const m = q.match(new RegExp(`\\b(?:${by})\\s+(.+)$`));
        if (!m) return [];
        const filters = this.termAlternation('filters');
        let rest = m[1]
          .replace(filters ? new RegExp(`\\b(?:${filters})\\b.+$`, 'i') : /$a/, '')
          .replace(/\bsorted.*$/i, '')
          .trim();
        if (!rest) return [];
        const and = this.termAlternation('and');
        const splitRe = and ? new RegExp(`\\s+(?:${and})\\s+|\\s*,\\s*`) : /\s*,\s*/;
        return rest.split(splitRe).map(p => singularize(p.trim())).filter(Boolean);
      }

      findBestFieldInText(q, role) {
        const candidates = [];
        for (const field of this.catalog.filter(f => f.role === role)) {
          const activeTerms = [this.displayLabel(field), ...this.localizedTerms(field)].map(norm).filter(Boolean);
          const terms = [...new Set([field.label, field.column, ...(field.synonyms || []), ...activeTerms].map(norm).filter(Boolean))];
          for (const term of terms) {
            if (new RegExp(`\\b${term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}\\b`).test(q)) {
              candidates.push({ field, score: term.length + (field.priority || 0) + (activeTerms.includes(term) ? 10 : 0) });
            }
          }
        }
        candidates.sort((a, b) => b.score - a.score);
        return candidates[0]?.field || null;
      }

      resolveFieldPhrase(phrase, roles) {
        const clean = norm(phrase);
        if (!clean) return { field: null };
        const directByField = new Map();
        for (const field of this.catalog.filter(f => roles.includes(f.role))) {
          const activeTerms = [this.displayLabel(field), ...this.localizedTerms(field)].map(norm).filter(Boolean);
          const terms = [...new Set([field.label, field.column, ...(field.synonyms || []), ...activeTerms].map(norm).filter(Boolean))];
          for (const term of terms) {
            if (clean === term || clean === singularize(term) || term === singularize(clean)) {
              const score = 1 + (field.priority || 0) / 100 + (activeTerms.includes(term) ? 0.1 : 0);
              const previous = directByField.get(field.id);
              if (!previous || score > previous.score) directByField.set(field.id, { field, score });
            }
          }
        }
        const direct = [...directByField.values()];
        if (direct.length) {
          direct.sort((a, b) => b.score - a.score);
          if (direct[1] && direct[0].score - direct[1].score < 0.03) {
            return this.fieldClarification(`Which field did you mean by "${phrase}"?`, direct.slice(0, 4).map(d => d.field));
          }
          return { field: direct[0].field };
        }
        const results = this.fieldFuse.search(clean)
          .filter(r => roles.includes(r.item.field.role))
          .slice(0, 4);
        if (!results.length || results[0].score > 0.28) return { field: null };
        if (results[1] && results[1].score - results[0].score < 0.04) {
          return this.fieldClarification(`Which field did you mean by "${phrase}"?`, results.map(r => r.item.field));
        }
        return { field: results[0].item.field };
      }

      fieldClarification(message, fields) {
        return {
          clarification: {
            message,
            choices: fields.map(field => ({ label: `${this.displayLabel(field)} (${field.table}.${field.column})`, replacement: this.displayLabel(field) }))
          }
        };
      }

      detectFilters(q, dimensions) {
        const matches = [];
        for (const item of this.valueItems) {
          const v = item.normalizedValue;
          if (!v || v.length < 2) continue;
          const pattern = v.includes(' ') ? v.replace(/\s+/g, '\\s+') : `\\b${v.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}\\b`;
          if (new RegExp(pattern).test(q)) matches.push(item);
        }
        const byValue = new Map();
        for (const match of matches.sort((a, b) => b.normalizedValue.length - a.normalizedValue.length)) {
          if ([...byValue.keys()].some(v => v.includes(match.normalizedValue))) continue;
          if (!byValue.has(match.normalizedValue)) byValue.set(match.normalizedValue, []);
          byValue.get(match.normalizedValue).push(match);
        }
        const filters = [];
        for (const [value, items] of byValue) {
          const uniqueFields = [...new Map(items.map(i => [i.field.id, i])).values()];
          if (uniqueFields.length > 1) {
            const cueHasFieldName = uniqueFields.find(i => [this.displayLabel(i.field), i.field.label, i.field.column, ...this.localizedTerms(i.field)].map(norm).some(term => term && q.includes(term)));
            if (cueHasFieldName) {
              filters.push({ field: cueHasFieldName.field, operator: '=', value: cueHasFieldName.value });
            } else {
              return {
                clarification: {
                  message: `Which field should "${items[0].value}" filter?`,
                  choices: uniqueFields.slice(0, 5).map(i => ({ label: `${i.field.label} = ${i.value}`, replacement: `${i.field.label} ${i.value}` }))
                }
              };
            }
          } else {
            const item = uniqueFields[0];
            filters.push({ field: item.field, operator: '=', value: item.value });
          }
        }
        return { filters };
      }

      getDefaultMetric() {
        const explicit = this.askConfig.defaultMetric;
        if (explicit) {
          const field = this.fieldByKey.get(fieldKey(explicit.table, explicit.column));
          if (field) return field;
        }
        const measures = this.catalog.filter(f => f.role === 'measure');
        return measures.find(f => f.default) || measures.sort((a, b) => this.measurePriority(b) - this.measurePriority(a))[0] || { kind: 'count_star', label: 'Records' };
      }

      measurePriority(field) {
        const n = norm(field.label + ' ' + field.column);
        const names = ['sales', 'revenue', 'amount', 'profit', 'margin', 'quantity', 'count', 'total', 'value'];
        const index = names.findIndex(name => n.includes(name));
        return (field.priority || 0) + (index >= 0 ? 100 - index : 0);
      }

      getDefaultTimeField() {
        const times = this.catalog.filter(f => f.role === 'time');
        return times.find(f => f.default) || times.sort((a, b) => (b.priority || 0) - (a.priority || 0))[0];
      }

      timeSqlExpression(field, alias) {
        const isNativeDate = /date|timestamp|time/i.test(field.type || '');
        if (isNativeDate) return `${alias}.${quoteIdent(field.column)}`;
        return field.parseFormat
          ? `STRPTIME(CAST(${alias}.${quoteIdent(field.column)} AS VARCHAR), '${field.parseFormat}')`
          : `TRY_CAST(${alias}.${quoteIdent(field.column)} AS DATE)`;
      }

      planSql(intent) {
        const fields = [intent.metric?.field || intent.metric, intent.timeField, ...intent.dimensions, ...intent.filters.map(f => f.field), intent.dateRange?.field].filter(f => f && f.table);
        const baseTable = intent.metric?.field?.table || intent.metric?.table || fields[0]?.table || this.config.dataSources?.[0]?.name;
        const neededTables = [...new Set([baseTable, ...fields.map(f => f.table)])];
        const joinPlan = this.buildJoinPlan(baseTable, neededTables);
        if (joinPlan.error) return joinPlan;

        const aliases = new Map(joinPlan.tables.map((table, i) => [table, safeAlias(table, i)]));
        const selectParts = [];
        const groupParts = [];
        const labelParts = [];
        for (const dim of intent.dimensions) {
          const alias = aliases.get(dim.table);
          let expr;
          if (dim.role === 'time') {
            expr = `DATE_TRUNC('${intent.timeGrain || 'month'}', ${this.timeSqlExpression(dim, alias)})`;
          } else {
            expr = `${alias}.${quoteIdent(dim.column)}`;
          }
          const dimAlias = `d${selectParts.length + 1}`;
          selectParts.push(`${expr} AS ${quoteIdent(dimAlias)}`);
          groupParts.push(expr);
          labelParts.push(`CAST(${quoteIdent(dimAlias)} AS VARCHAR)`);
        }

        let metricExpr;
        let metricFormat;
        if (intent.analysisType === 'list_values') {
          metricExpr = null;
        } else if (intent.metric?.kind === 'count_star') {
          metricExpr = 'COUNT(*)';
        } else if (intent.metric?.kind === 'count_distinct') {
          const f = intent.metric.field;
          metricExpr = `COUNT(DISTINCT ${aliases.get(f.table)}.${quoteIdent(f.column)})`;
        } else {
          const m = intent.metric;
          metricFormat = m.format;
          metricExpr = `${m.aggregation || 'SUM'}(${aliases.get(m.table)}.${quoteIdent(m.column)})`;
        }

        const whereParts = intent.filters.map(filter => `${aliases.get(filter.field.table)}.${quoteIdent(filter.field.column)} = '${escapeSqlString(filter.value)}'`);
        if (intent.dateRange?.field) {
          const field = intent.dateRange.field;
          const dateExpr = this.timeSqlExpression(field, aliases.get(field.table));
          if (intent.dateRange.kind === 'monthOfYear') {
            whereParts.push(`EXTRACT(month FROM ${dateExpr}) = ${Number(intent.dateRange.month)}`);
          } else {
            whereParts.push(`${dateExpr} >= DATE '${intent.dateRange.start}'`);
            whereParts.push(`${dateExpr} < DATE '${intent.dateRange.end}'`);
          }
        }
        const from = `${quoteIdent(baseTable)} ${aliases.get(baseTable)}`;
        const joins = joinPlan.joins.map(rel => {
          const leftAlias = aliases.get(rel.left.table);
          const rightAlias = aliases.get(rel.right.table);
          const joinTable = rel.right.table;
          return `JOIN ${quoteIdent(joinTable)} ${rightAlias} ON ${leftAlias}.${quoteIdent(rel.left.column)} = ${rightAlias}.${quoteIdent(rel.right.column)}`;
        });

        let sql;
        if (intent.analysisType === 'list_values') {
          const dim = intent.dimensions[0];
          const expr = `${aliases.get(dim.table)}.${quoteIdent(dim.column)}`;
          sql = `SELECT DISTINCT ${expr} AS label\nFROM ${from}\n${joins.join('\n')}${whereParts.length ? `\nWHERE ${whereParts.join(' AND ')}` : ''}\nORDER BY label ASC\nLIMIT ${Number(intent.limit) || this.askConfig.maxRows || 25}`;
          return { sql, columns: ['label'] };
        }
        if (intent.analysisType === 'yoy') {
          const timeField = intent.timeField || intent.dimensions.find(d => d.role === 'time') || this.getDefaultTimeField();
          if (!timeField) return { error: 'I could not find a date/time field for year-over-year analysis.' };
          const periodExpr = `DATE_TRUNC('year', ${this.timeSqlExpression(timeField, aliases.get(timeField.table))})`;
          sql = `WITH yearly AS (\n  SELECT ${periodExpr} AS period, ${metricExpr} AS value\n  FROM ${from}\n  ${joins.join('\n  ')}${whereParts.length ? `\n  WHERE ${whereParts.join(' AND ')}` : ''}\n  GROUP BY 1\n), yoy AS (\n  SELECT period, value, LAG(value) OVER (ORDER BY period) AS previous_value\n  FROM yearly\n)\nSELECT CAST(period AS VARCHAR) AS period, value, previous_value, value - previous_value AS change, CASE WHEN previous_value IS NULL OR previous_value = 0 THEN NULL ELSE (value - previous_value) / previous_value END AS change_percent\nFROM yoy\nORDER BY period ASC`;
          return { sql, columns: ['period', 'value', 'previous_value', 'change', 'change_percent'] };
        }
        if (intent.dimensions.length) {
          const innerSelect = [...selectParts, `${metricExpr} AS value`].join(',\n  ');
          const inner = `SELECT\n  ${innerSelect}\nFROM ${from}\n${joins.join('\n')}${whereParts.length ? `\nWHERE ${whereParts.join(' AND ')}` : ''}\nGROUP BY ${groupParts.map((_, i) => i + 1).join(', ')}`;
          const labelExpr = intent.dimensions.length === 1 ? `CAST(d1 AS VARCHAR)` : intent.dimensions.map((_, i) => `CAST(d${i + 1} AS VARCHAR)`).join(` || ' / ' || `);
          const orderBy = intent.dimensions[0]?.role === 'time' ? 'label ASC' : `value ${intent.sort?.direction || 'DESC'}`;
          sql = `SELECT ${labelExpr} AS label, value\nFROM (\n${inner}\n) q\nORDER BY ${orderBy}\nLIMIT ${Number(intent.limit) || this.askConfig.maxRows || 25}`;
        } else {
          sql = `SELECT ${metricExpr} AS value\nFROM ${from}\n${joins.join('\n')}${whereParts.length ? `\nWHERE ${whereParts.join(' AND ')}` : ''}`;
        }
        return { sql, columns: intent.dimensions.length ? ['label', 'value'] : ['value'], metricFormat };
      }

      buildJoinPlan(baseTable, neededTables) {
        const tables = [baseTable];
        const joins = [];
        for (const table of neededTables) {
          if (tables.includes(table)) continue;
          const path = this.findRelationshipPath(tables, table);
          if (!path) return { error: `I do not know how to join ${baseTable} to ${table}. Add a relationship or confirm an inferred join.` };
          for (const rel of path) {
            const leftKnown = tables.includes(rel.left.table);
            const rightKnown = tables.includes(rel.right.table);
            if (leftKnown && !rightKnown) {
              joins.push(rel);
              tables.push(rel.right.table);
            } else if (rightKnown && !leftKnown) {
              joins.push({ left: rel.right, right: rel.left, confidence: rel.confidence, inferred: rel.inferred });
              tables.push(rel.left.table);
            }
          }
        }
        return { tables, joins };
      }

      findRelationshipPath(startTables, targetTable) {
        const queue = startTables.map(table => ({ table, path: [] }));
        const visited = new Set(startTables);
        while (queue.length) {
          const current = queue.shift();
          if (current.table === targetTable) return current.path;
          for (const rel of this.relationships) {
            const next = rel.left.table === current.table ? rel.right.table : (rel.right.table === current.table ? rel.left.table : null);
            if (!next || visited.has(next)) continue;
            visited.add(next);
            queue.push({ table: next, path: [...current.path, rel] });
          }
        }
        return null;
      }

      recommendChart(intent, rows) {
        if (intent.analysisType === 'list_values' || intent.analysisType === 'yoy') return 'table';
        if (!intent.dimensions.length) return 'kpi';
        if (intent.dimensions[0].role === 'time') return 'line';
        if (intent.dimensions.length === 1 && rows.length <= 6 && intent.analysisType !== 'ranking') return 'pie';
        if (intent.dimensions.length <= 2) return 'bar';
        return 'table';
      }

      describeIntent(intent) {
        if (intent.analysisType === 'list_values') return `List ${this.displayLabel(intent.dimensions[0])}`;
        if (intent.analysisType === 'yoy') return `Year-over-year ${this.displayLabel(intent.metric || {})}`;
        const metric = intent.metric?.kind === 'count_star'
          ? 'Count records'
          : intent.metric?.kind === 'count_distinct'
            ? `Count distinct ${this.displayLabel(intent.metric.entity || { label: intent.metric.label })}`
            : `${intent.metric?.aggregation || 'SUM'}(${this.displayLabel(intent.metric || {})})`;
        const dims = intent.dimensions.length ? ` by ${intent.dimensions.map(d => this.displayLabel(d)).join(' and ')}` : '';
        const filters = intent.filters.length ? ` where ${intent.filters.map(f => `${this.displayLabel(f.field)} = ${f.value}`).join(' and ')}` : '';
        const dates = intent.dateRange ? (intent.dateRange.kind === 'monthOfYear' ? ` in month ${intent.dateRange.month}` : ` from ${intent.dateRange.start} to ${intent.dateRange.end}`) : '';
        const grain = intent.dimensions.some(d => d.role === 'time') ? ` (${intent.timeGrain || 'month'})` : '';
        const limit = intent.dimensions.length ? `, sorted ${intent.sort?.direction === 'ASC' ? 'ascending' : 'descending'}, limit ${intent.limit}` : '';
        return `${metric}${dims}${grain}${filters}${dates}${limit}`;
      }
    }

    customElements.define('portable-bi-dashboard', class extends LitElement {
      createRenderRoot() { return this; }
      static properties = {
        config: { type: Object },
        filters: { type: Object },
        _filterOptions: { state: true },
        _kpiResults: { state: true },
        _chartData: { state: true },
        _tableRows: { state: true },
        _activeTab: { state: true },
        _askQuestion: { state: true },
        _askResult: { state: true },
        _askLoading: { state: true },
        _askError: { state: true },
        _askClarification: { state: true },
        loading: { state: true },
        error: { state: true }
      };
      constructor() {
        super();
        this.config = DASHBOARD_CONFIG;
        this.filters = {};
        this._filterOptions = {};
        this._kpiResults = [];
        this._chartData = [];
        this._tableRows = [];
        this._activeTab = 'dashboard';
        this._askQuestion = DASHBOARD_CONFIG.askData.defaultQuestion;
        this._askResult = null;
        this._askLoading = false;
        this._askError = '';
        this._askClarification = null;
        this.loading = false;
        this.error = '';
        this.askEngine = new AskDataEngine(this.config, duckDBManager);
      }
      connectedCallback() {
        super.connectedCallback();
        this._initDashboard();
      }
      async _initDashboard() {
        this.loading = true;
        this.error = '';
        try {
          for (const s of this.config.dataSources) {
            await duckDBManager.query(`CREATE OR REPLACE VIEW ${quoteIdent(s.name)} AS SELECT * FROM read_csv_auto('${escapeSqlString(s.url)}')`);
          }
          await this.askEngine.initialize();
          let filterOptions = {};
          for (const filter of this.config.filters) {
            let optq = `SELECT DISTINCT ${quoteIdent(filter.source.column)} AS val FROM ${quoteIdent(filter.source.table)} ORDER BY val`;
            let optres = await duckDBManager.query(optq);
            let opts = toRows(optres).map(x => x.val);
            opts.unshift('All');
            filterOptions[filter.field] = opts;
            if (!this.filters[filter.field]) this.filters[filter.field] = 'All';
          }
          this._filterOptions = filterOptions;
          let kpiResults = [];
          for (const kpi of this.config.kpis) {
            let q = kpi.query;
            for (const filter of (this.config.filters || [])) {
              const val = this.filters[filter.field] || 'All';
              const filterExpr = (val && val !== 'All') ? `${filter.source.table}.${quoteIdent(filter.source.column)} = '${escapeSqlString(val)}'` : '1=1';
              q = q.replaceAll(`--filter:${filter.field}--`, filterExpr);
            }
            let r = await duckDBManager.query(q);
            let v = toRows(r)[0]?.value;
            kpiResults.push(v);
          }
          this._kpiResults = kpiResults;
          let chartData = [];
          for (const chartDef of this.config.charts) {
            let q = chartDef.query;
            let aliasMap = {};
            (q.match(/\b(?:from|join) +([a-zA-Z_][a-zA-Z0-9_]*) +([a-zA-Z_][a-zA-Z0-9_]*)/gi) || []).forEach(s => {
                const m = s.match(/\b(?:from|join) +([a-zA-Z_][a-zA-Z0-9_]*) +([a-zA-Z_][a-zA-Z0-9_]*)/i);
                if (m) aliasMap[m[1]] = m[2];
            });
            for (const filter of (this.config.filters || [])) {
              const val = this.filters[filter.field] || 'All';
              let tableRef = aliasMap[filter.source.table] || filter.source.table;
              const filterExpr = (val && val !== 'All') ? `${tableRef}.${quoteIdent(filter.source.column)} = '${escapeSqlString(val)}'` : '1=1';
              q = q.replaceAll(`--filter:${filter.field}--`, filterExpr);
            }
            let r = await duckDBManager.query(q);
            let rows = toRows(r);
            let labels = rows.map(row => String(row.label));
            let data = rows.map(row => numberValue(row.value));
            chartData.push({ chartDef, labels, data });
          }
          this._chartData = chartData;
          let tableRows = [];
          for (const tableDef of this.config.tables) {
            let q = tableDef.query;
            let aliasMap = {};
            (q.match(/\b(?:from|join) +([a-zA-Z_][a-zA-Z0-9_]*) +([a-zA-Z_][a-zA-Z0-9_]*)/gi) || []).forEach(s => {
                const m = s.match(/\b(?:from|join) +([a-zA-Z_][a-zA-Z0-9_]*) +([a-zA-Z_][a-zA-Z0-9_]*)/i);
                if (m) aliasMap[m[1]] = m[2];
            });
            for (const filter of (this.config.filters || [])) {
              const val = this.filters[filter.field] || 'All';
              let tableRef = aliasMap[filter.source.table] || filter.source.table;
              const filterExpr = (val && val !== 'All') ? `${tableRef}.${quoteIdent(filter.source.column)} = '${escapeSqlString(val)}'` : '1=1';
              q = q.replaceAll(`--filter:${filter.field}--`, filterExpr);
            }
            let r = await duckDBManager.query(q);
            tableRows.push(toRows(r));
          }
          this._tableRows = tableRows;
          this.loading = false;
        } catch (err) {
          console.error(err);
          this.loading = false;
          this.error = 'Failed to load data or render dashboard: ' + err;
        }
      }
      _onFilterChange(e, field) {
        this.filters = { ...this.filters, [field]: e.target.value };
        this._initDashboard();
      }
      _chartInstances = {};
      _askChartInstance = null;
      firstUpdated() {
        this._drawCharts();
      }
      updated(changed) {
        if (changed.has('_chartData') || changed.has('_activeTab')) this._drawCharts();
        if (changed.has('_askResult') || changed.has('_activeTab')) this._drawAskChart();
      }
      _drawCharts() {
        if (this._activeTab !== 'dashboard') return;
        if (this._chartInstances) {
          Object.values(this._chartInstances).forEach(inst => {
            try { inst?.destroy?.(); } catch (e) {}
          });
        }
        this._chartInstances = {};
        this._chartData.forEach(({ chartDef, labels, data }) => {
          const canvas = this.querySelector(`#${chartDef.id}`);
          if (!canvas) return;
          this._chartInstances[chartDef.id] = new Chart(canvas.getContext('2d'), {
            type: chartDef.type,
            data: { labels: labels, datasets: [{ label: chartDef.title || chartDef.id, data }] },
            options: chartDef.options || {}
          });
        });
      }
      _drawAskChart() {
        try { this._askChartInstance?.destroy?.(); } catch (e) {}
        this._askChartInstance = null;
        if (this._activeTab !== 'askData' || !this._askResult || !['bar', 'line', 'pie'].includes(this._askResult.chartType)) return;
        const canvas = this.querySelector('#ask-data-chart');
        if (!canvas) return;
        const rows = this._askResult.rows || [];
        this._askChartInstance = new Chart(canvas.getContext('2d'), {
          type: this._askResult.chartType,
          data: {
            labels: rows.map(row => String(row.label)),
            datasets: [{
              label: this._askResult.interpretation,
              data: rows.map(row => numberValue(row.value)),
              borderColor: '#406ac1',
              backgroundColor: ['#406ac1', '#6aa7e8', '#8fd0a6', '#f2bf5e', '#e07a72', '#8d7ae8', '#6cc5c0', '#c0d065']
            }]
          },
          options: { responsive: true, plugins: { legend: { display: this._askResult.chartType === 'pie' } } }
        });
      }
      async _runAsk() {
        this._askLoading = true;
        this._askError = '';
        this._askClarification = null;
        this._askResult = null;
        try {
          const result = await this.askEngine.ask(this._askQuestion);
          if (result.clarification) this._askClarification = result.clarification;
          else if (result.error) this._askError = result.error;
          else this._askResult = result;
        } catch (err) {
          console.error(err);
          this._askError = String(err);
        } finally {
          this._askLoading = false;
        }
      }
      _chooseClarification(choice) {
        this._askQuestion = `${this._askQuestion} ${choice.replacement}`;
        this._runAsk();
      }
      _setExample(example) {
        this._askQuestion = example;
        this._askError = '';
        this._askClarification = null;
      }
      render() {
        const c = this.config;
        return html`
          <header>
            <h1>${c.title}</h1>
            <span class="subtitle">${c.subtitle}</span>
          </header>

          <nav class="tabs" aria-label="App sections">
            <button class="tab-button ${this._activeTab === 'dashboard' ? 'active' : ''}" @click=${() => { this._activeTab = 'dashboard'; }}>Dashboard</button>
            <button class="tab-button ${this._activeTab === 'askData' ? 'active' : ''}" @click=${() => { this._activeTab = 'askData'; }}>Ask Data</button>
          </nav>

          ${this._activeTab === 'dashboard' ? this.renderDashboard(c) : this.renderAskData(c)}

          ${(this.loading || this.error || this._askLoading) ? html`
            <div id="loading-state" style="display:${(this.loading || this._askLoading)?'block':'none'}">${this._askLoading ? 'Asking data…' : 'Loading data, please wait…'}</div>
            <div id="error-state" style="display:${this.error?'block':'none'};color:#e74c3c">${this.error}</div>
          ` : nothing}
        `;
      }
      renderDashboard(c) {
        return html`
          <form id="filter-bar">
            ${c.filters.map(f => html`
              <label>${f.label}:
                <select name="${f.field}"
                        .value=${this.filters[f.field] || 'All'}
                        @change=${e => this._onFilterChange(e, f.field)}
                        style="margin-right:.8em;font-size:1em;padding:0.12em .9em;border-radius:.5em;border:1.5px solid #b0c4e7;background:#fff;">
                  ${this._filterOptions[f.field]?.map(o => html`<option value=${o}>${o}</option>`) || nothing}
                </select>
              </label>
            `)}
          </form>

          <section id="kpi-cards">
            ${c.kpis.map((kpi, i) => html`
              <div class="kpi-card">
                <div class="kpi-title">${kpi.title}</div>
                <div class="kpi-value">${kpi.format ? kpi.format(this._kpiResults[i]) : this._kpiResults[i]}</div>
              </div>
            `)}
          </section>

          <section id="viz-section">
            ${this._chartData.map(({ chartDef }) => html`
              <div class="chart-card">
                <canvas id="${chartDef.id}"></canvas>
              </div>
            `)}
          </section>

          ${c.tables.map((t, i) => html`
            <section id="table-section">
              <h2>${t.title}</h2>
              <div id="data-table-wrap">
                <table>
                  <thead><tr>${t.columns.map(col => html`<th>${col}</th>`)}</tr></thead>
                  <tbody>
                  ${(this._tableRows[i] || []).map(r => html`<tr>${t.columns.map(col => html`<td>${r[col]}</td>`)}</tr>`)}
                  </tbody>
                </table>
              </div>
            </section>
          `)}
        `;
      }
      renderAskData(c) {
        const result = this._askResult;
        return html`
          <main class="ask-page">
            <section class="ask-card">
              <h2>Ask Data</h2>
              <div class="ask-input-row">
                <input aria-label="Ask your data" .value=${this._askQuestion} @input=${e => this._askQuestion = e.target.value} @keydown=${e => { if (e.key === 'Enter') this._runAsk(); }} placeholder="sales by region">
                <button class="primary-button" @click=${this._runAsk} ?disabled=${this._askLoading}>Ask</button>
              </div>
              <div class="ask-examples">
                Try:
                ${(c.askData.examples || []).map((example, i) => html`${i ? ' · ' : ''}<button @click=${() => this._setExample(example)}>${example}</button>`)}
              </div>
            </section>

            ${this._askError ? html`<div class="warning">${this._askError}</div>` : nothing}
            ${this._askClarification ? html`
              <section class="ask-card">
                <h3>Clarification needed</h3>
                <p>${this._askClarification.message}</p>
                ${this._askClarification.choices.map(choice => html`<button class="choice-button" @click=${() => this._chooseClarification(choice)}>${choice.label}</button>`)}
              </section>
            ` : nothing}

            ${result ? html`
              <section class="ask-card">
                <div class="interpretation"><strong>Interpreted as:</strong> ${result.interpretation}</div>
                ${(result.warnings || []).map(w => html`<div class="warning">${w}</div>`)}
                ${this.renderAskResult(result)}
                <details class="sql-details">
                  <summary>Show SQL and details</summary>
                  <pre>${result.sql}</pre>
                  <p><strong>Confidence:</strong> ${Math.round((result.confidence || 0) * 100)}%</p>
                </details>
              </section>
            ` : nothing}
          </main>
        `;
      }
      renderAskResult(result) {
        if (result.chartType === 'kpi') {
          const value = result.rows[0]?.value;
          const metric = result.intent.metric?.field || result.intent.metric;
          return html`<div class="ask-kpi-value">${formatValue(value, metric?.format)}</div>${this.renderAskTable(result)}`;
        }
        if (['bar', 'line', 'pie'].includes(result.chartType)) {
          return html`
            <div class="ask-result-grid">
              <div><canvas id="ask-data-chart"></canvas></div>
              ${this.renderAskTable(result)}
            </div>
          `;
        }
        return this.renderAskTable(result);
      }
      formatAskCell(col, value, metric) {
        if (value === null || value === undefined || value === '') return '';
        if (String(col).includes('percent')) return formatValue(value, 'percent');
        if (['value', 'previous_value', 'change'].includes(col)) return formatValue(value, metric?.format);
        return String(value);
      }
      renderAskTable(result) {
        const columns = result.columns || [];
        const metric = result.intent.metric?.field || result.intent.metric;
        return html`
          <div class="ask-table-wrap">
            <table>
              <thead><tr>${columns.map(col => html`<th>${col}</th>`)}</tr></thead>
              <tbody>
                ${(result.rows || []).map(row => html`<tr>${columns.map(col => html`<td>${this.formatAskCell(col, row[col], metric)}</td>`)}</tr>`)}
              </tbody>
            </table>
          </div>
        `;
      }
    });
  </script>
</body>

</html>

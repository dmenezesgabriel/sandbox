    class DuckDBManager {
      constructor() {
        this.dbInstance = null;
        this.dbConnection = null;
      }
      async initialize() {
        if (this.dbInstance) return this.dbInstance;
        const JSDELIVR_BUNDLES = duckdb.getJsDelivrBundles();
        const bundle = await duckdb.selectBundle(JSDELIVR_BUNDLES);
        const worker_url = URL.createObjectURL(
          new Blob([`importScripts(\"${bundle.mainWorker}\");`], { type: 'text/javascript' })
        );
        const worker = new Worker(worker_url);
        const logger = new duckdb.ConsoleLogger();
        const db = new duckdb.AsyncDuckDB(logger, worker);
        await db.instantiate(bundle.mainModule, bundle.pthreadWorker);
        URL.revokeObjectURL(worker_url);
        this.dbInstance = db;
        this.dbConnection = await db.connect();
        return db;
      }
      async getConnection() {
        await this.initialize();
        return this.dbConnection;
      }
      async query(sql) {
        const connection = await this.getConnection();
        return connection.query(sql);
      }
    }

        },

        }
      ],
      tables: [

          query: `SELECT c.Region, p.Category, SUM(s.Sales) AS Sales
        FROM sales s JOIN customer c ON s.\"Customer ID\"=c.\"Customer ID\" JOIN product p ON s.\"Product ID\"=p.\"Product ID\"
        WHERE --filter:Region-- AND --filter:Category--
        GROUP BY c.Region, p.Category ORDER BY Sales DESC LIMIT 20` ,

    };

    const toRows = result => typeof result?.toArray === "function" ? result.toArray() : result?.rows || result || [];
    const quoteIdent = name => `"${String(name).replaceAll('"', '""')}"`;
    const escapeSqlString = value => String(value).replaceAll("'", "''");
    const norm = value => String(value || '')
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')
      .toLowerCase()
      .replace(/[^a-z0-9]+/g, ' ')
      .trim();
    const compact = value => norm(value).replaceAll(' ', '');
    const escapeRegExp = value => String(value || '').replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const singularize = value => String(value || '').replace(/ies$/i, 'y').replace(/s$/i, '');
    const isIdLike = name => /(^|\s|_|-)(id|key|code|postal|zip|row)(\s|_|-|$)/i.test(name) || / id$/i.test(name);
    const isNumericType = type => /int|double|float|decimal|numeric|real|hugeint|bigint|smallint|utinyint|uinteger/i.test(type || '');
    const isDateName = name => /date|time|month|year|timestamp/i.test(name || '');
    const numberValue = value => typeof value === 'bigint' ? Number(value) : Number(value || 0);
    const isoDate = date => date.toISOString().slice(0, 10);
    const asIsoDate = value => {
      if (!value) return null;
      if (value instanceof Date) return isoDate(value);
      if (typeof value === 'number') return isoDate(new Date(value));
      const s = String(value);
      const m = s.match(/\d{4}-\d{2}-\d{2}/);
      return m ? m[0] : null;
    };
    const addDays = (date, days) => new Date(Date.UTC(date.getUTCFullYear(), date.getUTCMonth(), date.getUTCDate() + days));
    const addMonths = (date, months) => new Date(Date.UTC(date.getUTCFullYear(), date.getUTCMonth() + months, 1));
    const startOfMonth = date => new Date(Date.UTC(date.getUTCFullYear(), date.getUTCMonth(), 1));
    const startOfYear = date => new Date(Date.UTC(date.getUTCFullYear(), 0, 1));

    function formatValue(value, format) {
      const n = numberValue(value);
      if (format === 'currency') return "$" + Math.round(n).toLocaleString();
      if (format === 'percent') return (n * 100).toFixed(1) + "%";
      if (Number.isFinite(n)) return n.toLocaleString();
      return String(value ?? '');
    }

    function fieldKey(table, column) {
      return `${table}::${column}`;
    }

    function safeAlias(tableName, index) {
      return `t${index}_${String(tableName).replace(/[^a-zA-Z0-9_]/g, '_')}`;
    }

    function detectDateFormat(samples) {
      const values = samples.map(String).filter(Boolean).slice(0, 200);
      if (!values.length) return null;
      const candidates = [
        { fmt: "%Y-%m-%d", re: /^(\d{4})-(\d{1,2})-(\d{1,2})$/, order: ['y', 'm', 'd'] },
        { fmt: "%d-%m-%Y", re: /^(\d{1,2})-(\d{1,2})-(\d{4})$/, order: ['d', 'm', 'y'] },
        { fmt: "%m-%d-%Y", re: /^(\d{1,2})-(\d{1,2})-(\d{4})$/, order: ['m', 'd', 'y'] },
        { fmt: "%d/%m/%Y", re: /^(\d{1,2})\/(\d{1,2})\/(\d{4})$/, order: ['d', 'm', 'y'] },
        { fmt: "%m/%d/%Y", re: /^(\d{1,2})\/(\d{1,2})\/(\d{4})$/, order: ['m', 'd', 'y'] },
        { fmt: "%Y/%m/%d", re: /^(\d{4})\/(\d{1,2})\/(\d{1,2})$/, order: ['y', 'm', 'd'] }
      ];
      let best = null;
      for (const c of candidates) {
        let score = 0;
        for (const value of values) {
          const m = value.match(c.re);
          if (!m) continue;
          const parts = Object.fromEntries(c.order.map((name, i) => [name, Number(m[i + 1])]));
          if (parts.y >= 1900 && parts.y <= 2200 && parts.m >= 1 && parts.m <= 12 && parts.d >= 1 && parts.d <= 31) score++;
        }
        if (!best || score > best.score) best = { format: c.fmt, score };
      }
      return best && best.score / values.length >= 0.6 ? best.format : null;
    }

    class ResultShapeAnalyzer {
      analyze(rows, columns, intent) {
        const cols = columns || Object.keys(rows[0] || {});
        const numeric = [];
        const categoric = [];
        const time = [];
        for (const col of cols) {
          const values = rows.map(row => row[col]).filter(v => v !== null && v !== undefined && v !== '');
          if (intent.dimensions?.some(d => d.role === 'time') && (col === 'label' || col === 'period')) time.push(col);
          else if (values.length && values.every(v => Number.isFinite(Number(v)))) numeric.push(col);
          else categoric.push(col);
        }
        const seriesCount = intent.dimensions?.length > 1 ? new Set(rows.map(r => String(r.label || '').split(' / ')[0])).size : 1;
        const groupCount = new Set(rows.map(r => String(r.label ?? r.period ?? ''))).size;
        return {
          columns: cols,
          rowCount: rows.length,
          numeric,
          categoric,
          time,
          numericCount: numeric.length,
          categoricCount: categoric.length,
          timeCount: time.length,
          seriesCount,
          groupCount,
          hasMetric: numeric.length > 0,
          oneObservationPerGroup: groupCount === rows.length
        };
      }
    }

    class ChartDecisionTree {
      constructor(capabilities = {}) {
        this.capabilities = { kpi: true, table: true, bar: true, line: true, area: true, pie: true, ...capabilities };
      }

      decide(shape, intent) {
        if (intent.analysisType === 'list_values') return this.decision(['CATEGORIC only', '1 variable'], 'table', ['bar'], 'Listing distinct categorical values is clearest as a table.');
        if (intent.analysisType === 'yoy') return this.decision(['TIME SERIES', '1 series', 'year-over-year calculation'], 'table', ['line'], 'YoY includes multiple derived numeric columns, so a table preserves exact values and change percentages.');
        if (!intent.dimensions?.length && shape.numericCount === 1) return this.decision(['NUMERIC only', '1 variable', 'single aggregate'], 'kpi', ['bar'], 'A single aggregate value is best shown as a KPI.');
        if (intent.dimensions?.[0]?.role === 'time') {
          const path = ['TIME SERIES', shape.seriesCount > 1 ? 'several series' : '1 series'];
          if (shape.seriesCount > 7) return this.decision([...path, 'many series'], 'table', ['heatmap', 'small multiples'], 'More than 7 line series would be hard to read; table is the enabled fallback.');
          return this.decision([...path, shape.seriesCount > 1 ? 'few series (<7)' : 'single metric over ordered time'], 'line', ['area', 'bar'], 'Time is ordered, so a line chart shows trend direction clearly.');
        }
        if (shape.categoricCount >= 1 && shape.numericCount === 1) {
          const path = ['NUMERIC + CATEGORIC (mixed)', 'one observation per group', '1 numeric'];
          if (shape.rowCount <= 5 && !intent.sort?.direction && this.capabilities.pie) return this.decision(path, 'pie', ['bar', 'donut'], 'Few categories with one numeric can be shown as part-to-whole; anti-pattern guard prevents large pies.');
          return this.decision(path, 'bar', ['lollipop', 'treemap'], 'One numeric metric grouped by categories is most reliably compared with a bar chart.');
        }
        if (shape.numericCount === 2 && shape.categoricCount === 0) return this.decision(['NUMERIC only', '2 variables', shape.rowCount < 2000 ? 'few points (<2000)' : 'many points'], shape.rowCount < 2000 ? 'scatter' : 'table', ['2D density', 'hex bin'], 'Two numeric variables can be compared as points; dense renderers are not enabled.');
        return this.decision(['Fallback'], 'table', [], 'The result shape is best preserved as a table with the enabled renderers.');
      }

      decision(path, recommended, alternatives, reason) {
        const rendered = this.capabilities[recommended] ? recommended : 'table';
        return {
          path,
          recommended,
          rendered,
          alternatives,
          reason: rendered === recommended ? reason : `${reason} ${recommended} is not enabled, so rendering as table.`
        };
      }
    }

    class InsightGenerator {
      generate(rows, intent, shape) {
        if (!rows?.length) return ['No rows matched this question.'];
        if (intent.analysisType === 'list_values') return [`Found ${rows.filter(r => r.label !== null && r.label !== undefined && r.label !== '').length} distinct ${intent.dimensions.map(d => d.label).join(' / ')} values.`];
        if (intent.analysisType === 'yoy') return this.yoyInsights(rows);
        if (!intent.dimensions?.length && rows[0]?.value !== undefined) return [`Total ${intent.metric?.label || intent.metric?.column || 'value'} is ${formatValue(rows[0].value, intent.metric?.format)}.`];
        if (rows[0]?.value !== undefined) return this.groupedMetricInsights(rows, intent);
        return [];
      }

      groupedMetricInsights(rows, intent) {
        const metricFormat = intent.metric?.format;
        const valid = rows.filter(r => Number.isFinite(Number(r.value)));
        if (!valid.length) return [];
        const total = valid.reduce((sum, r) => sum + Number(r.value), 0);
        const top = [...valid].sort((a, b) => Number(b.value) - Number(a.value))[0];
        const bottom = [...valid].sort((a, b) => Number(a.value) - Number(b.value))[0];
        const insights = [];
        if (top) insights.push(`${top.label} is highest at ${formatValue(top.value, metricFormat)}${total ? ` (${formatValue(Number(top.value) / total, 'percent')} of total)` : ''}.`);
        if (bottom && bottom.label !== top?.label) insights.push(`${bottom.label} is lowest at ${formatValue(bottom.value, metricFormat)}.`);
        if (valid.length >= 3 && total) {
          const topN = [...valid].sort((a, b) => Number(b.value) - Number(a.value)).slice(0, Math.min(3, valid.length));
          const share = topN.reduce((sum, row) => sum + Number(row.value), 0) / total;
          insights.push(`Top ${topN.length} ${intent.dimensions?.[0]?.role === 'time' ? 'periods' : 'groups'} account for ${formatValue(share, 'percent')} of total.`);
        }
        if (intent.dimensions?.[0]?.role === 'time' && valid.length >= 2) {
          const first = valid[0];
          const last = valid[valid.length - 1];
          const change = Number(last.value) - Number(first.value);
          const pct = Number(first.value) ? change / Number(first.value) : null;
          insights.push(`${last.label} is ${change >= 0 ? 'up' : 'down'} ${formatValue(Math.abs(change), metricFormat)}${pct === null ? '' : ` (${formatValue(Math.abs(pct), 'percent')})`} versus ${first.label}.`);
        }
        if (valid.length >= 4) {
          const avg = total / valid.length;
          const outliers = valid.filter(r => Number(r.value) > avg * 1.5).map(r => r.label).slice(0, 3);
          if (outliers.length) insights.push(`Above-average standout ${intent.dimensions?.[0]?.role === 'time' ? 'periods' : 'groups'}: ${outliers.join(', ')}.`);
        }
        return insights;
      }

      yoyInsights(rows) {
        const last = [...rows].reverse().find(r => r.change_percent !== null && r.change_percent !== undefined && r.change_percent !== '');
        const insights = [];
        if (last) insights.push(`Latest YoY change is ${formatValue(last.change_percent, 'percent')} (${formatValue(last.change, 'currency')}).`);
        const best = rows.filter(r => Number.isFinite(Number(r.change_percent))).sort((a, b) => Number(b.change_percent) - Number(a.change_percent))[0];
        if (best) insights.push(`Strongest YoY growth was ${String(best.period).slice(0, 4)} at ${formatValue(best.change_percent, 'percent')}.`);
        return insights;
      }
    }

    class SemanticFieldMatcher {
      constructor(config = {}, helpers = {}) {
        this.config = config;
        this.helpers = helpers;
        this.enabled = config.enabled !== false;
        this.model = config.model || 'onnx-community/all-MiniLM-L6-v2-ONNX';
        this.dtype = config.dtype || 'q4';
        this.minScore = config.minScore ?? 0.42;
        this.minMargin = config.minMargin ?? 0.04;
        this.batchSize = config.batchSize || 16;
        this.extractor = null;
        this.catalogKey = '';
        this.index = [];
        this.loading = null;
        this.queryCache = new Map();
      }

      async matchField(text, roles, catalog) {
        const clean = norm(text);
        if (!this.enabled || !clean || clean.length < 2) return null;
        const ready = await this.initialize(catalog);
        if (!ready) return null;
        const embedding = await this.embedOne(clean);
        if (!embedding) return null;
        const scored = this.index
          .filter(item => roles.includes(item.field.role))
          .map(item => ({ ...item, score: cosineSimilarity(embedding, item.embedding) }))
          .sort((a, b) => b.score - a.score);
        const best = scored[0];
        if (!best || best.score < this.minScore) return null;
        const second = scored[1];
        if (second && best.score - second.score < this.minMargin) {
          return { ambiguous: true, fields: scored.slice(0, 4).map(item => item.field), score: best.score };
        }
        return { field: best.field, score: best.score };
      }

      async initialize(catalog) {
        const catalogKey = catalog.map(field => field.id).join('|');
        if (this.extractor && this.catalogKey === catalogKey) return true;
        if (this.loading) return this.loading;
        this.loading = this.load(catalog, catalogKey);
        return this.loading;
      }

      async load(catalog, catalogKey) {
        try {
          const { pipeline, env, LogLevel } = await import('@huggingface/transformers');
          env.logLevel = LogLevel.ERROR;
          this.extractor = await pipeline('feature-extraction', this.model, { dtype: this.dtype });
          const texts = catalog.map(field => this.fieldText(field));
          const embeddings = await this.embedBatch(texts);
          this.index = catalog.map((field, index) => ({ field, embedding: embeddings[index] })).filter(item => item.embedding);
          this.catalogKey = catalogKey;
          this.queryCache.clear();
          return true;
        } catch (err) {
          this.enabled = false;
          console.warn('[AskData] Semantic field matching disabled', err);
          return false;
        } finally {
          this.loading = null;
        }
      }

      fieldText(field) {
        const displayLabel = this.helpers.displayLabel?.(field) || field.label || field.column;
        const localizedTerms = this.helpers.localizedTerms?.(field) || [];
        return [
          `field: ${displayLabel}`,
          `column: ${field.column}`,
          `table: ${field.table}`,
          `role: ${field.role}`,
          field.description,
          ...(field.synonyms || []),
          ...localizedTerms
        ].filter(Boolean).join('. ');
      }

      async embedOne(text) {
        const key = norm(text);
        if (this.queryCache.has(key)) return this.queryCache.get(key);
        const [embedding] = await this.embedBatch([text]);
        this.queryCache.set(key, embedding);
        return embedding;
      }

      async embedBatch(texts) {
        const vectors = [];
        for (let i = 0; i < texts.length; i += this.batchSize) {
          const batch = texts.slice(i, i + this.batchSize);
          const output = await this.extractor(batch, { pooling: 'mean', normalize: true });
          vectors.push(...this.tensorRows(output));
        }
        return vectors;
      }

      tensorRows(tensor) {
        const dims = tensor.dims || [];
        const data = tensor.data || [];
        if (dims.length === 1) return [Float32Array.from(data)];
        const rows = dims[0] || 0;
        const width = dims.slice(1).reduce((product, value) => product * value, 1);
        return Array.from({ length: rows }, (_, row) => data.slice(row * width, (row + 1) * width));
      }
    }

    const cosineSimilarity = (a, b) => {
      let dot = 0, aNorm = 0, bNorm = 0;
      for (let i = 0; i < Math.min(a.length, b.length); i++) {
        dot += a[i] * b[i];
        aNorm += a[i] * a[i];
        bNorm += b[i] * b[i];
      }
      return aNorm && bNorm ? dot / (Math.sqrt(aNorm) * Math.sqrt(bNorm)) : 0;
    };

    class TermMatcher {
      constructor(vocabulary, localeFamily) {
        this.vocabulary = vocabulary || {};
        this.localeFamily = localeFamily || 'en';
      }

      terms(group) {
        return [...new Set(Object.values(this.vocabulary)
          .flatMap(groups => groups?.[group] || [])
          .map(norm)
          .filter(Boolean))];
      }

      alternation(group) {
        return this.terms(group)
          .sort((a, b) => b.length - a.length)
          .map(term => escapeRegExp(term).replace(/\s+/g, '\\s+'))
          .join('|');
      }

      pattern(group, flags = '') {
        const alt = this.alternation(group);
        return alt ? new RegExp(`\\b(?:${alt})\\b`, flags) : null;
      }

      patternFromTerm(term, flags = '') {
        const clean = norm(term);
        return clean ? new RegExp(`\\b${escapeRegExp(clean).replace(/\s+/g, '\\s+')}\\b`, flags) : null;
      }

      has(text, group) {
        const pattern = this.pattern(group);
        return !!pattern && pattern.test(norm(text));
      }

      first(text, group) {
        const pattern = this.pattern(group);
        return pattern ? norm(text).match(pattern)?.[0] || null : null;
      }
    }

    class MonthCatalog {
      constructor(locale) {
        this.locale = locale || 'en-US';
        this.months = this.buildMonths();
      }

      buildMonths() {
        const locales = [...new Set(['en-US', 'pt-BR', this.locale])];
        const byTerm = new Map();
        for (let month = 0; month < 12; month++) {
          for (const locale of locales) {
            for (const style of ['long', 'short']) {
              const label = new Intl.DateTimeFormat(locale, { month: style }).format(new Date(2024, month, 15)).replace(/\.$/, '');
              for (const term of [label, norm(label)]) {
                if (term) byTerm.set(term.toLowerCase(), month + 1);
              }
            }
          }
        }
        return [...byTerm.entries()]
          .map(([term, number]) => ({ term, number }))
          .sort((a, b) => b.term.length - a.term.length);
      }

      find(text) {
        for (const item of this.months) {
          const pattern = new RegExp(`\\b${escapeRegExp(item.term)}\\b(?:\\s+((?:19|20)\\d{2}))?`, 'i');
          const match = String(text || '').match(pattern);
          if (match) return { ...item, text: match[0], index: match.index ?? 0, year: match[1] ? Number(match[1]) : null };
        }
        return null;
      }

      has(text) {
        return !!this.find(text);
      }
    }

    class DateQuestionText {
      removeText(question, text) {
        const normalizedQuestion = norm(question);
        const normalizedText = norm(text);
        const normalizedPattern = new RegExp(`\\b${escapeRegExp(normalizedText).replace(/\s+/g, '\\s+')}\\b`);
        const normalizedResult = normalizedQuestion.replace(normalizedPattern, ' ').replace(/\s+/g, ' ').trim();
        if (normalizedResult !== normalizedQuestion) return normalizedResult;
        const originalPattern = new RegExp(`\\b${escapeRegExp(text).replace(/\s+/g, '\\s+')}\\b`, 'i');
        return String(question || '').replace(originalPattern, ' ').replace(/\s+/g, ' ').trim();
      }

      removeRange(question, index, length) {
        return `${question.slice(0, index)} ${question.slice(index + length)}`.replace(/\s+/g, ' ').trim();
      }
    }

    class RelativePeriodDateParser {
      constructor(termMatcher, textTools) {
        this.termMatcher = termMatcher;
        this.textTools = textTools;
      }

      parse(question, field) {
        const profile = field.dateProfile;
        const specs = [
          { group: 'latestYear', start: profile?.latestYearStart, end: profile?.latestYearEnd },
          { group: 'latestMonth', start: profile?.latestMonthStart, end: profile?.latestMonthEnd },
          { group: 'thisYear', calendar: 'year' },
          { group: 'thisMonth', calendar: 'month' }
        ];
        for (const spec of specs) {
          const text = this.termMatcher.first(question, spec.group);
          if (!text) continue;
          const range = this.rangeFor(spec);
          if (!range) return null;
          return {
            dateRange: { field, ...range, text },
            questionWithoutDate: this.textTools.removeText(question, text)
          };
        }
        return null;
      }

      rangeFor(spec) {
        if (!spec.calendar) return spec.start && spec.end ? { start: spec.start, end: spec.end } : null;
        if (spec.calendar === 'year') {
          const year = new Date().getFullYear();
          return { start: `${year}-01-01`, end: `${year + 1}-01-01` };
        }
        if (spec.calendar === 'month') {
          const monthStart = new Date(Date.UTC(new Date().getFullYear(), new Date().getMonth(), 1));
          return { start: isoDate(monthStart), end: isoDate(addMonths(monthStart, 1)) };
        }
        return null;
      }
    }

    class NamedMonthDateParser {
      constructor(monthCatalog, textTools) {
        this.monthCatalog = monthCatalog;
        this.textTools = textTools;
      }

      parse(question, field) {
        const match = this.monthCatalog.find(question);
        if (!match) return null;
        const questionWithoutDate = this.textTools.removeRange(question, match.index, match.text.length);
        if (!match.year) {
          return { dateRange: { field, kind: 'monthOfYear', month: match.number, text: match.text }, questionWithoutDate };
        }
        const startDate = new Date(Date.UTC(match.year, match.number - 1, 1));
        return {
          dateRange: { field, start: isoDate(startDate), end: isoDate(addMonths(startDate, 1)), text: match.text },
          questionWithoutDate
        };
      }
    }

    class ChronoDateParser {
      constructor({ primaryParser, fallbackParser, termMatcher, monthCatalog, textTools }) {
        this.primaryParser = primaryParser;
        this.fallbackParser = fallbackParser;
        this.termMatcher = termMatcher;
        this.monthCatalog = monthCatalog;
        this.textTools = textTools;
      }

      parse(question, field) {
        if (!this.primaryParser?.parse) return null;
        const result = this.findResult(this.primaryParser.parse(question, new Date(), { forwardDate: false }) || [])
          || this.findResult(this.fallbackParser?.parse?.(question, new Date(), { forwardDate: false }) || [], true);
        if (!result) return null;
        const range = this.toDateRange(result, field);
        if (!range) return null;
        return {
          dateRange: range,
          questionWithoutDate: this.textTools.removeRange(question, result.index, result.text.length)
        };
      }

      findResult(results, strictNumeric = false) {
        return results.find(result => this.hasDateCue(result.text) && (!strictNumeric || !this.isAmbiguousNumericDate(result.text)));
      }

      hasDateCue(text) {
        const normalized = norm(text);
        return this.termMatcher.has(normalized, 'dateCue')
          || this.monthCatalog.has(text)
          || /^\d{4}$/.test(normalized)
          || this.isAmbiguousNumericDate(text);
      }

      isAmbiguousNumericDate(text) {
        return /\d{1,2}[\/-]\d{1,2}(?:[\/-]\d{2,4})?/.test(String(text || ''));
      }

      toDateRange(result, field) {
        const text = norm(result.text);
        const startDate = result.start?.date?.();
        if (!startDate || Number.isNaN(startDate.getTime())) return null;
        const startUtc = new Date(Date.UTC(startDate.getFullYear(), startDate.getMonth(), startDate.getDate()));
        let start = startUtc;
        let end = result.end?.date?.();
        if (end && !Number.isNaN(end.getTime())) end = addDays(new Date(Date.UTC(end.getFullYear(), end.getMonth(), end.getDate())), 1);

        const saysYear = this.termMatcher.has(text, 'yearCue') || /^\d{4}$/.test(text);
        const saysMonth = this.termMatcher.has(text, 'monthCue') || this.monthCatalog.has(result.text);
        const saysDay = this.termMatcher.has(text, 'dayCue');

        if (!end) {
          if (saysYear && !saysMonth && !saysDay) {
            start = startOfYear(startUtc);
            end = new Date(Date.UTC(start.getUTCFullYear() + 1, 0, 1));
          } else if (saysMonth && !saysDay) {
            start = startOfMonth(startUtc);
            end = addMonths(start, 1);
          } else {
            end = addDays(startUtc, 1);
          }
        }
        return { field, start: isoDate(start), end: isoDate(end), text: result.text };
      }
    }

    class ExplicitYearDateParser {
      constructor(textTools) {
        this.textTools = textTools;
      }

      parse(question, field) {
        const match = String(question || '').match(/\b(?:in|em|no|na)?\s*((?:19|20)\d{2})\b/i);
        if (!match) return null;
        const year = Number(match[1]);
        return {
          dateRange: { field, start: `${year}-01-01`, end: `${year + 1}-01-01`, text: match[0].trim() },
          questionWithoutDate: this.textTools.removeRange(question, match.index ?? 0, match[0].length)
        };
      }
    }

    class DateRangeParser {
      constructor({ primaryParser, fallbackParser, termMatcher, locale }) {
        const textTools = new DateQuestionText();
        const monthCatalog = new MonthCatalog(locale);
        this.parsers = [
          new RelativePeriodDateParser(termMatcher, textTools),
          new NamedMonthDateParser(monthCatalog, textTools),
          new ChronoDateParser({ primaryParser, fallbackParser, termMatcher, monthCatalog, textTools }),
          new ExplicitYearDateParser(textTools)
        ];
      }

      parse(question, field) {
        if (!field) return { dateRange: null, questionWithoutDate: question };
        for (const parser of this.parsers) {
          const result = parser.parse(question, field);
          if (result) return result;
        }
        return { dateRange: null, questionWithoutDate: question };
      }
    }

    class IntentCueDetector {
      constructor(termMatcher) {
        this.termMatcher = termMatcher;
      }

      isListRequest(text) {
        return (this.termMatcher.has(text, 'listAction') || this.termMatcher.has(text, 'listKind'))
          && (this.termMatcher.has(text, 'listAvailability') || this.termMatcher.has(text, 'listKind') || this.termMatcher.has(text, 'listCategory') || this.termMatcher.has(text, 'listSubcategory'));
      }

      listFieldHint(text) {
        if (this.termMatcher.has(text, 'listSubcategory')) return 'sub category';
        if (this.termMatcher.has(text, 'listCategory')) return 'category';
        return null;
      }

      extractListPhrase(text) {
        const action = this.termMatcher.alternation('listAction');
        const availability = this.termMatcher.alternation('listAvailability');
        if (!action) return null;
        const match = norm(text).match(new RegExp(`\\b(?:${action})\\s+(.+?)(?:\\s+(?:${availability})|$)`));
        const phrase = match?.[1];
        if (!phrase) return null;
        return this.cleanListPhrase(phrase);
      }

      cleanListPhrase(phrase) {
        const prepositions = this.termMatcher.alternation('prepositions');
        const kind = this.termMatcher.alternation('listKind');
        return phrase
          .replace(prepositions ? new RegExp(`\\b(?:${prepositions})\\b.+$`) : /$a/, '')
          .replace(kind ? new RegExp(`\\b(?:${kind})\\b\\s*(?:${prepositions})?`) : /$a/, '')
          .trim();
      }

      superlativeDirection(text) {
        if (this.termMatcher.has(text, 'bottom') || this.termMatcher.has(text, 'least')) return 'ASC';
        if (this.termMatcher.has(text, 'top') || this.termMatcher.has(text, 'most')) return 'DESC';
        return null;
      }

      extractSuperlativeSubject(text) {
        const mostOrLeast = [this.termMatcher.alternation('most'), this.termMatcher.alternation('least')].filter(Boolean).join('|');
        if (!mostOrLeast) return null;
        const normalized = norm(text);
        const question = this.termMatcher.alternation('subjectQuestion');
        const verb = this.termMatcher.alternation('ownershipVerb');
        const article = this.termMatcher.alternation('article');
        const patterns = [
          question && verb ? new RegExp(`\\b(?:${question})\\s+(.+?)\\s+(?:${verb})\\s+(?:(?:${article})\\s+)?(?:${mostOrLeast})\\b`) : null,
          new RegExp(`\\b(?:${mostOrLeast})\\s+.+?\\s+(.+)$`)
        ].filter(Boolean);
        for (const pattern of patterns) {
          const phrase = normalized.match(pattern)?.[1];
          if (phrase) return singularize(phrase);
        }
        return null;
      }

      isYearOverYear(text) {
        return this.termMatcher.has(text, 'yearOverYear');
      }

      timeGrain(text) {
        if (this.termMatcher.has(text, 'dayGrain')) return 'day';
        if (this.termMatcher.has(text, 'monthGrain') || this.termMatcher.has(text, 'overTime')) return 'month';
        if (this.termMatcher.has(text, 'yearGrain')) return 'year';
        return null;
      }
    }

    class FieldSearchIndex {
      constructor({ catalog, displayLabel, localizedTerms }) {
        this.catalog = catalog;
        this.displayLabel = displayLabel;
        this.localizedTerms = localizedTerms;
        this.fieldById = new Map();
        this.index = new MiniSearch({ fields: ['text'], storeFields: ['role'], searchOptions: { combineWith: 'AND' } });
      }

      rebuild() {
        this.index = new MiniSearch({ fields: ['text'], storeFields: ['role'], searchOptions: { combineWith: 'AND' } });
        this.fieldById.clear();
        const docs = this.catalog().map(field => {
          this.fieldById.set(field.id, field);
          return {
            id: field.id,
            role: field.role,
            text: norm([
              this.displayLabel(field),
              field.label,
              field.column,
              field.table,
              field.role,
              field.description,
              ...(field.synonyms || []),
              ...Object.values(field.localizedSynonyms || {}).flat(),
              ...this.localizedTerms(field)
            ].filter(Boolean).join(' '))
          };
        });
        this.index.addAll(docs);
      }

      search(query, roles) {
        const clean = norm(query);
        if (!clean) return [];
        return this.index.search(clean, { combineWith: 'AND' })
          .filter(result => roles.includes(result.role))
          .map(result => ({ field: this.fieldById.get(result.id), score: result.score }))
          .filter(result => result.field)
          .sort((a, b) => b.score - a.score);
      }
    }

    class TextSearchFieldMatchStrategy {
      constructor({ fieldSearchIndex }) {
        this.fieldSearchIndex = fieldSearchIndex;
      }

      async matchPhrase(phrase, roles) {
        const index = this.fieldSearchIndex();
        if (!index) return null;
        const results = index.search(phrase, roles).slice(0, 4);
        if (!results.length || results[0].score < 0.9) return null;
        if (results[1] && results[0].score - results[1].score < 0.15) return { ambiguous: true, fields: results.map(result => result.field), score: results[0].score };
        return { field: results[0].field, score: Math.min(0.9, results[0].score / 3) };
      }

      async findInText(text, role) {
        const index = this.fieldSearchIndex();
        if (!index) return null;
        const result = index.search(text, [role])[0];
        return result && result.score >= 1.1 ? result.field : null;
      }
    }

    class ExactFieldMatchStrategy {
      constructor({ catalog, displayLabel, localizedTerms, termMatcher }) {
        this.catalog = catalog;
        this.displayLabel = displayLabel;
        this.localizedTerms = localizedTerms;
        this.termMatcher = termMatcher;
      }

      async matchPhrase(phrase, roles) {
        const clean = norm(phrase);
        if (!clean) return { field: null };
        const direct = this.directMatches(clean, roles);
        if (!direct.length) return null;
        direct.sort((a, b) => b.score - a.score);
        if (direct[1] && direct[0].score - direct[1].score < 0.03) return { ambiguous: true, fields: direct.slice(0, 4).map(match => match.field) };
        return { field: direct[0].field };
      }

      async findInText(text, role) {
        const candidates = [];
        for (const field of this.catalog().filter(field => field.role === role)) {
          for (const term of this.fieldTerms(field)) {
            if (this.termMatcher.patternFromTerm(term)?.test(text)) {
              candidates.push({ field, score: term.length + (field.priority || 0) + (this.activeTerms(field).includes(term) ? 10 : 0) });
            }
          }
        }
        candidates.sort((a, b) => b.score - a.score);
        return candidates[0]?.field || null;
      }

      directMatches(clean, roles) {
        const byField = new Map();
        for (const field of this.catalog().filter(field => roles.includes(field.role))) {
          for (const term of this.fieldTerms(field)) {
            if (clean === term || clean === singularize(term) || term === singularize(clean)) {
              const score = 1 + (field.priority || 0) / 100 + (this.activeTerms(field).includes(term) ? 0.1 : 0);
              const previous = byField.get(field.id);
              if (!previous || score > previous.score) byField.set(field.id, { field, score });
            }
          }
        }
        return [...byField.values()];
      }

      fieldTerms(field) {
        return [...new Set([field.label, field.column, ...(field.synonyms || []), ...this.activeTerms(field)].map(norm).filter(Boolean))];
      }

      activeTerms(field) {
        return [this.displayLabel(field), ...this.localizedTerms(field)].map(norm).filter(Boolean);
      }
    }

    class FuseFieldMatchStrategy {
      constructor({ fieldFuse }) {
        this.fieldFuse = fieldFuse;
      }

      async matchPhrase(phrase, roles) {
        const fuse = this.fieldFuse();
        if (!fuse) return null;
        const results = fuse.search(norm(phrase)).filter(result => roles.includes(result.item.field.role)).slice(0, 4);
        if (!results.length || results[0].score > 0.28) return null;
        if (results[1] && results[1].score - results[0].score < 0.04) return { ambiguous: true, fields: results.map(result => result.item.field) };
        return { field: results[0].item.field };
      }
    }

    class SemanticFieldMatchStrategy {
      constructor({ semanticMatcher, catalog }) {
        this.semanticMatcher = semanticMatcher;
        this.catalog = catalog;
      }

      async matchPhrase(phrase, roles) {
        return this.semanticMatcher.matchField(norm(phrase), roles, this.catalog());
      }

      async findInText(text, role) {
        const result = await this.semanticMatcher.matchField(text, [role], this.catalog());
        return result?.ambiguous ? null : result?.field || null;
      }
    }

    class FieldResolver {
      constructor(strategies, clarify) {
        this.strategies = strategies;
        this.clarify = clarify;
      }

      async resolvePhrase(phrase, roles) {
        if (!norm(phrase)) return { field: null };
        for (const strategy of this.strategies) {
          const result = await strategy.matchPhrase?.(phrase, roles);
          if (!result) continue;
          if (result.ambiguous) return this.clarify(`Which field did you mean by "${phrase}"?`, result.fields);
          if (result.field) return { field: result.field };
        }
        return { field: null };
      }

      async findInText(text, role) {
        for (const strategy of this.strategies) {
          const field = await strategy.findInText?.(text, role);
          if (field) return field;
        }
        return null;
      }
    }

    class AskDataEngine {
      constructor(config, duckDBManager) {
        this.config = config;
        this.askConfig = config.askData || {};
        this.duckDBManager = duckDBManager;
        this.catalog = [];
        this.fieldByKey = new Map();
        this.relationships = [];
        this.ambiguousRelationships = [];
        this.entities = [];
        this.fieldFuse = null;
        this.fieldSearchIndex = null;
        this.valueFuse = null;
        this.valueItems = [];
        this.valuePhraseMaxWords = 1;
        this.locale = this.resolveLocale();
        this.localeFamily = this.locale.toLowerCase().startsWith('pt') ? 'pt' : 'en';
        this.vocabulary = this.buildVocabulary();
        this.termMatcher = new TermMatcher(this.vocabulary, this.localeFamily);
        this.chronoParser = this.localeFamily === 'pt' ? chronoPt : chronoEn;
        this.dateRangeParser = new DateRangeParser({
          primaryParser: this.chronoParser,
          fallbackParser: this.localeFamily === 'pt' ? chronoEn : chronoPt,
          termMatcher: this.termMatcher,
          locale: this.locale
        });
        this.intentCues = new IntentCueDetector(this.termMatcher);
        this.shapeAnalyzer = new ResultShapeAnalyzer();
        this.chartDecisionTree = new ChartDecisionTree(this.askConfig.chartCapabilities || {});
        this.insightGenerator = new InsightGenerator();
        this.semanticMatcher = new SemanticFieldMatcher(this.askConfig.semanticMatching || {}, {
          displayLabel: item => this.displayLabel(item),
          localizedTerms: item => this.localizedTerms(item)
        });
        this.fieldResolver = new FieldResolver([
          new ExactFieldMatchStrategy({
            catalog: () => this.catalog,
            displayLabel: field => this.displayLabel(field),
            localizedTerms: field => this.localizedTerms(field),
            termMatcher: this.termMatcher
          }),
          new TextSearchFieldMatchStrategy({ fieldSearchIndex: () => this.fieldSearchIndex }),
          new FuseFieldMatchStrategy({ fieldFuse: () => this.fieldFuse }),
          new SemanticFieldMatchStrategy({ semanticMatcher: this.semanticMatcher, catalog: () => this.catalog })
        ], (message, fields) => this.fieldClarification(message, fields));
        this.initialized = false;
      }

      resolveLocale() {
        const configured = this.askConfig.locale;
        const browserLocale = typeof navigator !== 'undefined' ? navigator.language : '';
        const locale = configured && configured !== 'auto' ? configured : browserLocale;
        return locale || this.askConfig.locales?.fallback || 'en-US';
      }

      buildVocabulary() {
        const defaults = {
          en: {
            by: ['by'],
            top: ['top', 'best', 'highest'],
            bottom: ['bottom', 'worst', 'lowest'],
            most: ['most', 'highest', 'largest', 'biggest', 'best'],
            least: ['least', 'lowest', 'smallest', 'worst'],
            count: ['count', 'number of', 'how many'],
            overTime: ['over time', 'trend'],
            filters: ['in', 'for', 'where', 'with'],
            and: ['and'],
            prepositions: ['of', 'for', 'in'],
            listAction: ['which', 'what', 'list', 'show'],
            subjectQuestion: ['which', 'what'],
            ownershipVerb: ['has'],
            article: ['the'],
            listAvailability: ['do i have', 'are there', 'exist', 'available'],
            listKind: ['kind', 'kinds', 'type', 'types'],
            listCategory: ['category', 'categories'],
            listSubcategory: ['subcategory', 'sub category', 'sub categories'],
            latestYear: ['latest year', 'last year'],
            latestMonth: ['latest month', 'last month'],
            thisYear: ['this year'],
            thisMonth: ['this month'],
            dateCue: ['today', 'yesterday', 'tomorrow', 'last', 'this', 'next', 'year', 'month', 'week', 'quarter', 'day'],
            yearCue: ['year'],
            monthCue: ['month'],
            dayCue: ['day', 'today', 'yesterday', 'tomorrow'],
            dayGrain: ['day', 'daily'],
            monthGrain: ['month', 'monthly'],
            yearGrain: ['year', 'yearly', 'annual'],
            yearOverYear: ['year over year', 'yoy', 'year on year'],
            unsupportedMetric: ['profit', 'margin', 'earnings', 'cost']
          },
          pt: {
            by: ['por'],
            top: ['top', 'maiores', 'melhores'],
            bottom: ['menores', 'piores'],
            most: ['maior', 'maiores', 'melhor', 'melhores', 'mais'],
            least: ['menor', 'menores', 'pior', 'piores', 'menos'],
            count: ['contar', 'conte', 'quantos', 'numero de', 'número de'],
            overTime: ['ao longo do tempo', 'tendencia', 'tendência', 'evolucao', 'evolução'],
            filters: ['em', 'para', 'onde', 'com'],
            and: ['e'],
            prepositions: ['de', 'do', 'da', 'para', 'em'],
            listAction: ['quais', 'qual', 'liste', 'mostrar'],
            subjectQuestion: ['quais', 'qual'],
            ownershipVerb: ['tem', 'possui'],
            article: ['o', 'a'],
            listAvailability: ['tenho', 'existem', 'disponiveis', 'disponíveis'],
            listKind: ['tipo', 'tipos'],
            listCategory: ['categoria', 'categorias'],
            listSubcategory: ['subcategoria', 'subcategorias', 'sub categoria'],
            latestYear: ['ano mais recente', 'ultimo ano', 'último ano', 'ano passado', 'ano anterior'],
            latestMonth: ['mes mais recente', 'mês mais recente', 'ultimo mes', 'último mês', 'mes passado', 'mês passado', 'mes anterior', 'mês anterior'],
            thisYear: ['este ano', 'esse ano'],
            thisMonth: ['este mes', 'este mês', 'esse mes', 'esse mês'],
            dateCue: ['hoje', 'ontem', 'amanha', 'amanhã', 'passado', 'passada', 'este', 'esta', 'proximo', 'próximo', 'ano', 'mes', 'mês', 'semana', 'trimestre', 'dia'],
            yearCue: ['ano'],
            monthCue: ['mes', 'mês'],
            dayCue: ['dia', 'hoje', 'ontem', 'amanha', 'amanhã'],
            dayGrain: ['dia', 'diario', 'diária', 'diario', 'diaria'],
            monthGrain: ['mes', 'mês', 'mensal'],
            yearGrain: ['ano', 'anual'],
            yearOverYear: ['ano a ano', 'ano contra ano'],
            unsupportedMetric: ['lucro', 'margem', 'custo']
          }
        };
        const configured = this.askConfig.vocabulary || {};
        const merged = structuredClone(defaults);
        for (const [lang, groups] of Object.entries(configured)) {
          merged[lang] ||= {};
          for (const [group, terms] of Object.entries(groups)) merged[lang][group] = [...new Set([...(merged[lang][group] || []), ...terms])];
        }
        return merged;
      }

      terms(group) {
        return this.termMatcher.terms(group);
      }

      termAlternation(group) {
        return this.termMatcher.alternation(group);
      }

      hasTerm(q, group) {
        return this.termMatcher.has(q, group);
      }

      localizedMapValue(map, fallback) {
        if (!map) return fallback;
        return map[this.locale] || map[this.localeFamily] || Object.entries(map).find(([key]) => key.toLowerCase().startsWith(this.localeFamily))?.[1] || fallback;
      }

      localizedTerms(item) {
        const map = item.localizedSynonyms || item.localizedTerms;
        if (!map) return [];
        const active = this.localizedMapValue(map, []);
        const all = Object.values(map).flat().filter(Boolean);
        return [...new Set([...(Array.isArray(active) ? active : []), ...all])];
      }

      displayLabel(item) {
        return this.localizedMapValue(item.labels, item.label || item.column || '');
      }

      async initialize() {
        if (this.initialized) return;
        console.info('[AskData] Building data catalog');
        await this.buildCatalog();
        this.buildFuseIndexes();
        this.initialized = true;
        console.info('[AskData] Ready', {
          fields: this.catalog.length,
          relationships: this.relationships,
          ambiguousRelationships: this.ambiguousRelationships
        });
      }

      async buildCatalog() {
        const overrides = new Map((this.askConfig.fields || []).map(f => [fieldKey(f.table, f.column), f]));
        const tableProfiles = new Map();
        const fields = [];

        for (const source of this.config.dataSources || []) {
          const table = source.name;
          const countRows = toRows(await this.duckDBManager.query(`SELECT COUNT(*) AS row_count FROM ${quoteIdent(table)}`));
          const rowCount = numberValue(countRows[0]?.row_count ?? countRows[0]?.rowCount ?? countRows[0]?.count_star ?? 0);
          tableProfiles.set(table, { rowCount });

          const schemaRows = toRows(await this.duckDBManager.query(`DESCRIBE SELECT * FROM ${quoteIdent(table)}`));
          for (const col of schemaRows) {
            const column = col.column_name || col.columnName || col.name;
            const type = col.column_type || col.columnType || col.type || '';
            if (!column) continue;
            const override = overrides.get(fieldKey(table, column)) || {};
            const sampleRows = toRows(await this.duckDBManager.query(`SELECT ${quoteIdent(column)} AS v FROM ${quoteIdent(table)} WHERE ${quoteIdent(column)} IS NOT NULL LIMIT ${this.askConfig.profiling?.maxSampleRows || 1000}`));
            const samples = sampleRows.map(r => r.v).filter(v => v !== null && v !== undefined);
            const distinctRows = toRows(await this.duckDBManager.query(`SELECT COUNT(DISTINCT ${quoteIdent(column)}) AS distinct_count FROM ${quoteIdent(table)}`));
            const cardinality = numberValue(distinctRows[0]?.distinct_count ?? 0);
            const nameLooksDate = isDateName(column);
            const parseFormat = override.parseFormat || (nameLooksDate ? detectDateFormat(samples) : null);
            let role = override.role;
            if (!role) {
              if (parseFormat || nameLooksDate) role = 'time';
              else if (isIdLike(column)) role = 'key';
              else if (isNumericType(type)) role = 'measure';
              else role = 'dimension';
            }
            const lowEnoughCardinality = cardinality <= (this.askConfig.profiling?.maxDistinctValuesPerField || 100);
            const sampleValues = (role === 'dimension' && lowEnoughCardinality)
              ? [...new Set(samples.map(String))].sort().slice(0, this.askConfig.profiling?.maxDistinctValuesPerField || 100)
              : [];
            const field = {
              id: fieldKey(table, column),
              table,
              column,
              type,
              role,
              label: override.label || column,
              labels: override.labels || {},
              aggregation: override.aggregation || (role === 'measure' ? 'SUM' : undefined),
              synonyms: override.synonyms || [],
              localizedSynonyms: override.localizedSynonyms || {},
              description: override.description || '',
              format: override.format,
              default: !!override.default,
              priority: override.priority || 0,
              parseFormat,
              sampleValues,
              samples: samples.slice(0, 100),
              dateProfile: null,
              cardinality,
              rowCount
            };
            if (field.role === 'time') field.dateProfile = await this.profileTimeField(field);
            fields.push(field);
            this.fieldByKey.set(field.id, field);
          }
        }

        this.catalog = fields;
        this.inferRelationships(fields, tableProfiles);
        this.buildEntities(fields);
      }

      async profileTimeField(field) {
        try {
          const expr = this.timeSqlExpression(field, quoteIdent(field.table));
          const sql = `SELECT MIN(CAST(${expr} AS DATE)) AS min_date, MAX(CAST(${expr} AS DATE)) AS max_date FROM ${quoteIdent(field.table)} WHERE ${expr} IS NOT NULL`;
          const row = toRows(await this.duckDBManager.query(sql))[0] || {};
          const minDate = asIsoDate(row.min_date);
          const maxDate = asIsoDate(row.max_date);
          if (!minDate || !maxDate) return null;
          const max = new Date(`${maxDate}T00:00:00Z`);
          const latestMonthStart = startOfMonth(max);
          const latestYearStart = startOfYear(max);
          return {
            minDate,
            maxDate,
            latestMonthStart: isoDate(latestMonthStart),
            latestMonthEnd: isoDate(addMonths(latestMonthStart, 1)),
            latestYearStart: isoDate(latestYearStart),
            latestYearEnd: isoDate(new Date(Date.UTC(latestYearStart.getUTCFullYear() + 1, 0, 1)))
          };
        } catch (err) {
          console.warn('[AskData] Failed to profile time field', field.id, err);
          return null;
        }
      }

      inferRelationships(fields, tableProfiles) {
        const explicit = this.config.relationships || this.askConfig.relationships || [];
        if (explicit.length) {
          this.relationships = explicit.map(r => ({ ...r, confidence: 1, inferred: false }));
          return;
        }
        if (this.askConfig.inferRelationships === false) return;

        const byColumn = new Map();
        for (const f of fields.filter(f => f.role === 'key' || isIdLike(f.column))) {
          const key = compact(f.column);
          if (!byColumn.has(key)) byColumn.set(key, []);
          byColumn.get(key).push(f);
        }

        const accepted = [];
        const ambiguous = [];
        for (const matches of byColumn.values()) {
          for (let i = 0; i < matches.length; i++) {
            for (let j = i + 1; j < matches.length; j++) {
              const a = matches[i], b = matches[j];
              if (a.table === b.table) continue;
              const overlap = this.sampleOverlap(a.samples, b.samples);
              const aUnique = a.cardinality / Math.max(1, a.rowCount);
              const bUnique = b.cardinality / Math.max(1, b.rowCount);
              const oneSideLookup = (aUnique > 0.75 && bUnique < 0.95) || (bUnique > 0.75 && aUnique < 0.95);
              let score = 0.45;
              if (/id$/i.test(norm(a.column).replaceAll(' ', ''))) score += 0.25;
              if (overlap > 0.2) score += 0.2;
              if (oneSideLookup) score += 0.1;
              const rel = {
                left: { table: a.table, column: a.column },
                right: { table: b.table, column: b.column },
                confidence: Number(score.toFixed(2)),
                inferred: true,
                overlap: Number(overlap.toFixed(2))
              };
              if (score >= (this.askConfig.relationshipInference?.autoAcceptThreshold || 0.85)) accepted.push(rel);
              else if (score >= (this.askConfig.relationshipInference?.ambiguousThreshold || 0.6)) ambiguous.push(rel);
            }
          }
        }
        this.relationships = accepted;
        this.ambiguousRelationships = ambiguous;
      }

      sampleOverlap(aValues, bValues) {
        const a = new Set(aValues.map(String));
        const b = new Set(bValues.map(String));
        if (!a.size || !b.size) return 0;
        let overlap = 0;
        for (const v of a) if (b.has(v)) overlap++;
        return overlap / Math.min(a.size, b.size);
      }

      buildEntities(fields) {
        const configured = this.askConfig.entities || [];
        const entities = configured.map(e => ({
          ...e,
          field: this.fieldByKey.get(fieldKey(e.table, e.key)),
          terms: [e.label, this.displayLabel(e), e.singular, ...(e.synonyms || []), ...this.localizedTerms(e)].filter(Boolean).map(norm)
        })).filter(e => e.field);

        for (const field of fields.filter(f => f.role === 'key' && / id$/i.test(f.column))) {
          const base = field.column.replace(/\s*ID$/i, '');
          if (!entities.some(e => e.table === field.table && e.key === field.column)) {
            entities.push({
              label: `${base}s`,
              singular: base,
              table: field.table,
              key: field.column,
              field,
              terms: [norm(base), norm(`${base}s`)]
            });
          }
        }
        for (const entity of entities) {
          const configured = (entity.preferredDimensions || [])
            .map(column => this.fieldByKey.get(fieldKey(entity.table, column)))
            .filter(Boolean);
          const inferred = fields
            .filter(f => f.table === entity.table && f.role === 'dimension')
            .sort((a, b) => (a.cardinality - b.cardinality) || ((b.priority || 0) - (a.priority || 0)));
          entity.preferredDimensionFields = configured.length ? configured : inferred;
        }
        this.entities = entities;
      }

      buildFuseIndexes() {
        const fieldItems = this.catalog.map(field => {
          const activeLabel = this.displayLabel(field);
          const activeSynonyms = this.localizedTerms(field);
          const allSynonyms = [...new Set([...(field.synonyms || []), ...Object.values(field.localizedSynonyms || {}).flat()])];
          return {
            field,
            text: [activeLabel, field.label, field.column, ...allSynonyms].join(' '),
            activeLabel,
            activeSynonyms,
            label: field.label,
            column: field.column,
            synonyms: field.synonyms || [],
            allSynonyms,
            role: field.role
          };
        });
        this.fieldFuse = new Fuse(fieldItems, {
          includeScore: true,
          threshold: 0.35,
          keys: [
            { name: 'activeLabel', weight: 0.45 },
            { name: 'activeSynonyms', weight: 0.45 },
            { name: 'label', weight: 0.3 },
            { name: 'column', weight: 0.3 },
            { name: 'synonyms', weight: 0.25 },
            { name: 'allSynonyms', weight: 0.2 },
            { name: 'text', weight: 0.1 }
          ]
        });
        this.fieldSearchIndex = new FieldSearchIndex({
          catalog: () => this.catalog,
          displayLabel: field => this.displayLabel(field),
          localizedTerms: field => this.localizedTerms(field)
        });
        this.fieldSearchIndex.rebuild();

        this.valueItems = [];
        for (const field of this.catalog.filter(f => f.role === 'dimension')) {
          for (const value of field.sampleValues || []) {
            const normalizedValue = norm(value);
            if (normalizedValue) this.valueItems.push({ value, normalizedValue, field });
          }
        }
        this.valuePhraseMaxWords = Math.max(1, ...this.valueItems.map(item => item.normalizedValue.split(/\s+/).length));
        this.valueFuse = new Fuse(this.valueItems, {
          includeScore: true,
          threshold: 0.2,
          ignoreLocation: true,
          keys: ['normalizedValue', 'value']
        });
      }

      async ask(question) {
        await this.initialize();
        const parsed = await this.parseQuestion(question);
        if (parsed.error) return parsed;
        if (parsed.clarification) return parsed;
        const planned = this.planSql(parsed.intent);
        if (planned.error) return planned;
        console.info('[AskData] SQL', planned.sql);
        const result = await this.duckDBManager.query(planned.sql);
        const rows = toRows(result).map(row => Object.fromEntries(Object.entries(row).map(([k, v]) => [k, typeof v === 'bigint' ? Number(v) : v])));
        const columns = rows.length ? Object.keys(rows[0]) : planned.columns;
        const shape = this.shapeAnalyzer.analyze(rows, columns, parsed.intent);
        const chartDecision = this.chartDecisionTree.decide(shape, parsed.intent);
        const insights = this.insightGenerator.generate(rows, parsed.intent, shape);
        const confidence = this.estimateIntentConfidence(parsed.intent);
        return {
          question,
          interpretation: this.describeIntent(parsed.intent),
          intent: parsed.intent,
          sql: planned.sql,
          rows,
          columns,
          shape,
          chartDecision,
          insights,
          chartType: chartDecision.rendered,
          warnings: parsed.warnings || [],
          confidence
        };
      }

      parseDateRange(question) {
        return this.dateRangeParser.parse(question, this.getDefaultTimeField());
      }

      async detectListField(q) {
        if (!this.intentCues.isListRequest(q)) return null;
        if (await this.findBestFieldInText(q, 'measure')) return null;

        const hintedField = this.intentCues.listFieldHint(q);
        if (hintedField) return (await this.resolveFieldPhrase(hintedField, ['dimension'])).field;

        const entity = this.entities.find(e => e.terms.some(term => this.termMatcher.patternFromTerm(term)?.test(q)));
        if (this.hasTerm(q, 'listKind') && entity?.preferredDimensionFields?.length) return entity.preferredDimensionFields[0];
        if (entity) return entity.preferredDimensionFields?.find(f => /name|nome/i.test(f.column)) || entity.preferredDimensionFields?.[0];

        const phrase = this.intentCues.extractListPhrase(q);
        return phrase ? (await this.resolveFieldPhrase(phrase, ['dimension'])).field : null;
      }

      async detectSuperlative(q) {
        const direction = this.intentCues.superlativeDirection(q);
        if (!direction) return null;
        const phrase = this.intentCues.extractSuperlativeSubject(q);
        if (!phrase) return null;
        const field = (await this.resolveFieldPhrase(phrase, ['dimension'])).field;
        if (!field) return null;
        const metric = await this.findBestFieldInText(q, 'measure') || this.getDefaultMetric();
        return { field, metric, direction };
      }

      isYearOverYear(q) {
        return this.intentCues.isYearOverYear(q);
      }

      async parseQuestion(question) {
        const dateInfo = this.parseDateRange(question);
        const q = norm(dateInfo.questionWithoutDate || question);
        const warnings = [];
        if (!q) return { error: 'Ask a question first.' };
        const unsupportedMetric = this.detectUnsupportedMetric(q);
        if (unsupportedMetric) {
          const available = this.catalog.filter(f => f.role === 'measure').map(f => f.label).join(', ') || 'none';
          return {
            error: `I could not find a "${unsupportedMetric}" metric in this dataset. Available measures: ${available}.`,
            suggestions: this.catalog.filter(f => f.role === 'measure').slice(0, 4).map(f => question.replace(new RegExp(unsupportedMetric, 'ig'), f.label.toLowerCase()))
          };
        }

        const listField = await this.detectListField(q);
        if (listField) {
          const filters = this.detectFilters(q, [listField]);
          if (filters.clarification) return filters;
          return {
            intent: {
              question,
              analysisType: 'list_values',
              metric: null,
              dimensions: [listField],
              filters: filters.filters,
              dateRange: dateInfo.dateRange,
              sort: { by: 'label', direction: 'ASC' },
              limit: this.askConfig.maxRows || 25
            },
            warnings
          };
        }

        const topOrBottom = [this.termAlternation('top'), this.termAlternation('bottom')].filter(Boolean).join('|');
        const topMatch = topOrBottom ? q.match(new RegExp(`\\b(${topOrBottom})\\s+(\\d+)\\b`)) : null;
        const superlative = await this.detectSuperlative(q);
        const limit = superlative ? 1 : (topMatch ? Math.min(Number(topMatch[2]), this.askConfig.maxRows || 25) : (this.askConfig.maxRows || 25));
        const sortDirection = superlative?.direction || (topMatch && this.terms('bottom').includes(norm(topMatch[1])) ? 'ASC' : 'DESC');
        const isRanking = !!topMatch || !!superlative;
        const isYoY = this.isYearOverYear(q);
        const timeGrain = isYoY ? 'year' : this.detectTimeGrain(q);
        const isCount = this.hasTerm(q, 'count');

        let metric = null;
        let countEntity = null;
        if (isCount) {
          countEntity = this.entities.find(entity => entity.terms.some(term => this.termMatcher.patternFromTerm(term)?.test(q)));
          metric = countEntity ? { kind: 'count_distinct', entity: countEntity, field: countEntity.field, label: countEntity.label } : { kind: 'count_star', label: 'Records' };
        } else {
          metric = superlative?.metric || await this.findBestFieldInText(q, 'measure') || this.getDefaultMetric();
        }

        const dimensions = [];
        const topDimensionPhrase = superlative?.field ? null : this.extractTopDimensionPhrase(q);
        if (superlative?.field) dimensions.push(superlative.field);
        const byPhrases = this.extractByPhrases(q);
        if (topDimensionPhrase) {
          const field = await this.resolveFieldPhrase(topDimensionPhrase, ['dimension', 'time']);
          if (field.clarification) return field;
          if (field.field) dimensions.push(field.field);
        }
        for (const phrase of byPhrases) {
          if (dimensions.length >= (this.askConfig.maxDimensions || 2)) break;
          if (['month', 'year', 'day', 'date', 'time'].includes(phrase) || /over time/.test(q)) continue;
          const field = await this.resolveFieldPhrase(phrase, ['dimension', 'time']);
          if (field.clarification) return field;
          if (field.field && !dimensions.some(d => d.id === field.field.id)) dimensions.push(field.field);
        }
        if ((timeGrain || this.hasTerm(q, 'overTime')) && !dimensions.some(d => d.role === 'time')) {
          const timeField = this.getDefaultTimeField();
          if (timeField) dimensions.unshift(timeField);
          else warnings.push('I could not find a date/time field for a trend.');
        }
        if (!dimensions.length && isCount) {
          const byAfterCount = byPhrases[0];
          if (byAfterCount) {
            const field = await this.resolveFieldPhrase(byAfterCount, ['dimension', 'time']);
            if (field.field) dimensions.push(field.field);
          }
        }

        const filters = this.detectFilters(q, dimensions);
        if (filters.clarification) return filters;

        return {
          intent: {
            question,
            analysisType: isYoY ? 'yoy' : (dimensions.some(d => d.role === 'time') ? 'trend' : (isRanking || dimensions.length ? 'ranking' : 'kpi')),
            metric,
            timeField: isYoY ? this.getDefaultTimeField() : null,
            dimensions: dimensions.slice(0, this.askConfig.maxDimensions || 2),
            filters: filters.filters,
            dateRange: dateInfo.dateRange,
            sort: { by: 'value', direction: sortDirection },
            limit,
            timeGrain: timeGrain || (dimensions.some(d => d.role === 'time') ? 'month' : undefined)
          },
          warnings
        };
      }

      detectUnsupportedMetric(q) {
        const knownMetricTerms = new Set(this.catalog.filter(f => f.role === 'measure').flatMap(f => [f.label, f.column, ...(f.synonyms || []), ...this.localizedTerms(f)].map(norm)));
        const term = this.termMatcher.first(q, 'unsupportedMetric');
        return term && !knownMetricTerms.has(term) ? term : null;
      }

      detectTimeGrain(q) {
        return this.intentCues.timeGrain(q);
      }

      extractTopDimensionPhrase(q) {
        const topOrBottom = [this.termAlternation('top'), this.termAlternation('bottom')].filter(Boolean).join('|');
        const by = this.termAlternation('by');
        if (!topOrBottom || !by) return null;
        const m = q.match(new RegExp(`\\b(?:${topOrBottom})\\s+\\d+\\s+(.+?)\\s+(?:${by})\\s+`));
        return m ? singularize(m[1].replace(new RegExp(`\\b(?:${by}|${this.termAlternation('filters')})\\b.*$`), '').trim()) : null;
      }

      extractByPhrases(q) {
        const by = this.termAlternation('by');
        if (!by) return [];
        const byRe = new RegExp(`\\b(?:${by})\\b\\s*`, 'i');
        const firstBy = q.search(byRe);
        if (firstBy < 0) return [];
        const filters = this.termAlternation('filters');
        let rest = q.slice(firstBy).replace(byRe, '')
          .replace(filters ? new RegExp(`\\b(?:${filters})\\b.*$`, 'i') : /$a/, '')
          .replace(/\bsorted.*$/i, '')
          .trim();
        if (!rest) return [];
        const and = this.termAlternation('and');
        const separators = [`\\s+(?:${by})\\s+`, '\\s*,\\s*'];
        if (and) separators.push(`\\s+(?:${and})\\s+`);
        const splitRe = new RegExp(separators.join('|'), 'i');
        return rest.split(splitRe).map(p => singularize(p.trim())).filter(Boolean);
      }

      async findBestFieldInText(q, role) {
        return this.fieldResolver.findInText(q, role);
      }

      async resolveFieldPhrase(phrase, roles) {
        return this.fieldResolver.resolvePhrase(phrase, roles);
      }

      fieldClarification(message, fields) {
        return {
          clarification: {
            message,
            choices: fields.map(field => ({ label: `${this.displayLabel(field)} (${field.table}.${field.column})`, replacement: this.displayLabel(field) }))
          }
        };
      }

      detectFilters(q, dimensions) {
        const matches = [];
        const seen = new Set();
        const addMatch = (item, match = {}) => {
          const key = `${item.field.id}::${item.normalizedValue}`;
          const enriched = { ...item, matchScore: match.score ?? 1, matchSource: match.source || 'exact' };
          if (!seen.has(key)) {
            seen.add(key);
            matches.push(enriched);
          } else {
            const existing = matches.find(m => `${m.field.id}::${m.normalizedValue}` === key);
            if (existing && enriched.matchScore > (existing.matchScore || 0)) Object.assign(existing, enriched);
          }
        };
        for (const item of this.valueItems) {
          const v = item.normalizedValue;
          if (!v || v.length < 2) continue;
          const pattern = `\\b${escapeRegExp(v).replace(/\s+/g, '\\s+')}\\b`;
          if (new RegExp(pattern).test(q)) addMatch(item, { score: 1, source: 'exact_value' });
        }
        if (this.valueFuse) {
          const words = q.split(/\s+/).filter(Boolean);
          const maxWindow = Math.min(this.valuePhraseMaxWords || 1, 8, words.length);
          for (let size = 1; size <= maxWindow; size++) {
            for (let start = 0; start + size <= words.length; start++) {
              const phrase = words.slice(start, start + size).join(' ');
              if (phrase.length < 3) continue;
              for (const result of this.valueFuse.search(phrase, { limit: 3 })) {
                const itemWordCount = result.item.normalizedValue.split(/\s+/).length;
                if (itemWordCount !== size) continue;
                const fuzzyLimit = itemWordCount > 1 ? 0.025 : 0.001;
                if ((result.score ?? 1) <= fuzzyLimit) addMatch(result.item, { score: Math.max(0.75, 1 - (result.score || 0) * 10), source: 'fuzzy_value' });
              }
            }
          }
        }
        const byValue = new Map();
        for (const match of matches.sort((a, b) => b.normalizedValue.length - a.normalizedValue.length)) {
          if ([...byValue.keys()].some(v => v.includes(match.normalizedValue))) continue;
          if (!byValue.has(match.normalizedValue)) byValue.set(match.normalizedValue, []);
          byValue.get(match.normalizedValue).push(match);
        }
        const filters = [];
        for (const [value, items] of byValue) {
          const uniqueFields = [...new Map(items.map(i => [i.field.id, i])).values()];
          if (uniqueFields.length > 1) {
            const cueHasFieldName = uniqueFields.find(i => [this.displayLabel(i.field), i.field.label, i.field.column, ...this.localizedTerms(i.field)].map(norm).some(term => term && q.includes(term)));
            if (cueHasFieldName) {
              filters.push({ field: cueHasFieldName.field, operator: '=', value: cueHasFieldName.value, score: cueHasFieldName.matchScore || 0.9, source: cueHasFieldName.matchSource });
            } else {
              return {
                clarification: {
                  message: `Which field should "${items[0].value}" filter?`,
                  choices: uniqueFields.slice(0, 5).map(i => ({ label: `${i.field.label} = ${i.value}`, replacement: `${i.field.label} ${i.value}` }))
                }
              };
            }
          } else {
            const item = uniqueFields[0];
            filters.push({ field: item.field, operator: '=', value: item.value, score: item.matchScore || 0.9, source: item.matchSource });
          }
        }
        return { filters };
      }

      getDefaultMetric() {
        const explicit = this.askConfig.defaultMetric;
        if (explicit) {
          const field = this.fieldByKey.get(fieldKey(explicit.table, explicit.column));
          if (field) return field;
        }
        const measures = this.catalog.filter(f => f.role === 'measure');
        return measures.find(f => f.default) || measures.sort((a, b) => this.measurePriority(b) - this.measurePriority(a))[0] || { kind: 'count_star', label: 'Records' };
      }

      measurePriority(field) {
        const n = norm(field.label + ' ' + field.column);
        const names = ['sales', 'revenue', 'amount', 'profit', 'margin', 'quantity', 'count', 'total', 'value'];
        const index = names.findIndex(name => n.includes(name));
        return (field.priority || 0) + (index >= 0 ? 100 - index : 0);
      }

      getDefaultTimeField() {
        const times = this.catalog.filter(f => f.role === 'time');
        return times.find(f => f.default) || times.sort((a, b) => (b.priority || 0) - (a.priority || 0))[0];
      }

      timeSqlExpression(field, alias) {
        const isNativeDate = /date|timestamp|time/i.test(field.type || '');
        if (isNativeDate) return `${alias}.${quoteIdent(field.column)}`;
        return field.parseFormat
          ? `STRPTIME(CAST(${alias}.${quoteIdent(field.column)} AS VARCHAR), '${field.parseFormat}')`
          : `TRY_CAST(${alias}.${quoteIdent(field.column)} AS DATE)`;
      }

      planSql(intent) {
        const fields = [intent.metric?.field || intent.metric, intent.timeField, ...intent.dimensions, ...intent.filters.map(f => f.field), intent.dateRange?.field].filter(f => f && f.table);
        const baseTable = intent.metric?.field?.table || intent.metric?.table || fields[0]?.table || this.config.dataSources?.[0]?.name;
        const neededTables = [...new Set([baseTable, ...fields.map(f => f.table)])];
        const joinPlan = this.buildJoinPlan(baseTable, neededTables);
        if (joinPlan.error) return joinPlan;

        const aliases = new Map(joinPlan.tables.map((table, i) => [table, safeAlias(table, i)]));
        const selectParts = [];
        const groupParts = [];
        const labelParts = [];
        for (const dim of intent.dimensions) {
          const alias = aliases.get(dim.table);
          let expr;
          if (dim.role === 'time') {
            expr = `DATE_TRUNC('${intent.timeGrain || 'month'}', ${this.timeSqlExpression(dim, alias)})`;
          } else {
            expr = `${alias}.${quoteIdent(dim.column)}`;
          }
          const dimAlias = `d${selectParts.length + 1}`;
          selectParts.push(`${expr} AS ${quoteIdent(dimAlias)}`);
          groupParts.push(expr);
          labelParts.push(`CAST(${quoteIdent(dimAlias)} AS VARCHAR)`);
        }

        let metricExpr;
        let metricFormat;
        if (intent.analysisType === 'list_values') {
          metricExpr = null;
        } else if (intent.metric?.kind === 'count_star') {
          metricExpr = 'COUNT(*)';
        } else if (intent.metric?.kind === 'count_distinct') {
          const f = intent.metric.field;
          metricExpr = `COUNT(DISTINCT ${aliases.get(f.table)}.${quoteIdent(f.column)})`;
        } else {
          const m = intent.metric;
          metricFormat = m.format;
          metricExpr = `${m.aggregation || 'SUM'}(${aliases.get(m.table)}.${quoteIdent(m.column)})`;
        }

        const whereParts = intent.filters.map(filter => `${aliases.get(filter.field.table)}.${quoteIdent(filter.field.column)} = '${escapeSqlString(filter.value)}'`);
        if (intent.dateRange?.field) {
          const field = intent.dateRange.field;
          const dateExpr = this.timeSqlExpression(field, aliases.get(field.table));
          if (intent.dateRange.kind === 'monthOfYear') {
            whereParts.push(`EXTRACT(month FROM ${dateExpr}) = ${Number(intent.dateRange.month)}`);
          } else {
            whereParts.push(`${dateExpr} >= DATE '${intent.dateRange.start}'`);
            whereParts.push(`${dateExpr} < DATE '${intent.dateRange.end}'`);
          }
        }
        const from = `${quoteIdent(baseTable)} ${aliases.get(baseTable)}`;
        const joins = joinPlan.joins.map(rel => {
          const leftAlias = aliases.get(rel.left.table);
          const rightAlias = aliases.get(rel.right.table);
          const joinTable = rel.right.table;
          return `JOIN ${quoteIdent(joinTable)} ${rightAlias} ON ${leftAlias}.${quoteIdent(rel.left.column)} = ${rightAlias}.${quoteIdent(rel.right.column)}`;
        });

        let sql;
        if (intent.analysisType === 'list_values') {
          const dim = intent.dimensions[0];
          const expr = `${aliases.get(dim.table)}.${quoteIdent(dim.column)}`;
          const listWhereParts = [...whereParts, `${expr} IS NOT NULL`, `CAST(${expr} AS VARCHAR) <> ''`];
          sql = `SELECT DISTINCT ${expr} AS label\nFROM ${from}\n${joins.join('\n')}\nWHERE ${listWhereParts.join(' AND ')}\nORDER BY label ASC\nLIMIT ${Number(intent.limit) || this.askConfig.maxRows || 25}`;
          return { sql, columns: ['label'] };
        }
        if (intent.analysisType === 'yoy') {
          const timeField = intent.timeField || intent.dimensions.find(d => d.role === 'time') || this.getDefaultTimeField();
          if (!timeField) return { error: 'I could not find a date/time field for year-over-year analysis.' };
          const periodExpr = `DATE_TRUNC('year', ${this.timeSqlExpression(timeField, aliases.get(timeField.table))})`;
          sql = `WITH yearly AS (\n  SELECT ${periodExpr} AS period, ${metricExpr} AS value\n  FROM ${from}\n  ${joins.join('\n  ')}${whereParts.length ? `\n  WHERE ${whereParts.join(' AND ')}` : ''}\n  GROUP BY 1\n), yoy AS (\n  SELECT period, value, LAG(value) OVER (ORDER BY period) AS previous_value\n  FROM yearly\n)\nSELECT CAST(period AS VARCHAR) AS period, value, previous_value, value - previous_value AS change, CASE WHEN previous_value IS NULL OR previous_value = 0 THEN NULL ELSE (value - previous_value) / previous_value END AS change_percent\nFROM yoy\nORDER BY period ASC`;
          return { sql, columns: ['period', 'value', 'previous_value', 'change', 'change_percent'] };
        }
        if (intent.dimensions.length) {
          const innerSelect = [...selectParts, `${metricExpr} AS value`].join(',\n  ');
          const inner = `SELECT\n  ${innerSelect}\nFROM ${from}\n${joins.join('\n')}${whereParts.length ? `\nWHERE ${whereParts.join(' AND ')}` : ''}\nGROUP BY ${groupParts.map((_, i) => i + 1).join(', ')}`;
          const labelExpr = intent.dimensions.length === 1 ? `CAST(d1 AS VARCHAR)` : intent.dimensions.map((_, i) => `CAST(d${i + 1} AS VARCHAR)`).join(` || ' / ' || `);
          const orderBy = intent.dimensions[0]?.role === 'time' ? 'label ASC' : `value ${intent.sort?.direction || 'DESC'}`;
          sql = `SELECT ${labelExpr} AS label, value\nFROM (\n${inner}\n) q\nORDER BY ${orderBy}\nLIMIT ${Number(intent.limit) || this.askConfig.maxRows || 25}`;
        } else {
          sql = `SELECT ${metricExpr} AS value\nFROM ${from}\n${joins.join('\n')}${whereParts.length ? `\nWHERE ${whereParts.join(' AND ')}` : ''}`;
        }
        return { sql, columns: intent.dimensions.length ? ['label', 'value'] : ['value'], metricFormat };
      }

      buildJoinPlan(baseTable, neededTables) {
        const tables = [baseTable];
        const joins = [];
        for (const table of neededTables) {
          if (tables.includes(table)) continue;
          const path = this.findRelationshipPath(tables, table);
          if (!path) return { error: `I do not know how to join ${baseTable} to ${table}. Add a relationship or confirm an inferred join.` };
          for (const rel of path) {
            const leftKnown = tables.includes(rel.left.table);
            const rightKnown = tables.includes(rel.right.table);
            if (leftKnown && !rightKnown) {
              joins.push(rel);
              tables.push(rel.right.table);
            } else if (rightKnown && !leftKnown) {
              joins.push({ left: rel.right, right: rel.left, confidence: rel.confidence, inferred: rel.inferred });
              tables.push(rel.left.table);
            }
          }
        }
        return { tables, joins };
      }

      findRelationshipPath(startTables, targetTable) {
        const queue = startTables.map(table => ({ table, path: [] }));
        const visited = new Set(startTables);
        while (queue.length) {
          const current = queue.shift();
          if (current.table === targetTable) return current.path;
          for (const rel of this.relationships) {
            const next = rel.left.table === current.table ? rel.right.table : (rel.right.table === current.table ? rel.left.table : null);
            if (!next || visited.has(next)) continue;
            visited.add(next);
            queue.push({ table: next, path: [...current.path, rel] });
          }
        }
        return null;
      }

      estimateIntentConfidence(intent) {
        const q = norm(intent.question || '');
        const scores = [];
        const add = value => { if (Number.isFinite(value)) scores.push(Math.max(0, Math.min(1, value))); };
        if (intent.analysisType !== 'list_values') {
          if (intent.metric?.kind) add(0.95);
          else add(this.fieldEvidenceScore(q, intent.metric, 0.76));
        }
        for (const dim of intent.dimensions || []) add(this.fieldEvidenceScore(q, dim, 0.82));
        for (const filter of intent.filters || []) add(filter.score || 0.85);

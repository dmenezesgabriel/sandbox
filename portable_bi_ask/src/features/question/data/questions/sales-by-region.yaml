id: 'sales-by-region'
slug: 'sales-by-region'
title: 'Sales by Region'
description: 'Total sales broken down by geographic region'
type: chart
chartType: bar
queryType: sql
query: >
  SELECT c.Region AS label, SUM(s.Sales) AS value
  FROM sales s
  JOIN customer c ON s."Customer ID" = c."Customer ID"
  GROUP BY c.Region
  ORDER BY value DESC
dataSourceSlugs:
  - superstore-sales
  - superstore-customers
options:
  aspectRatio: 1.7
  plugins:
    legend:
      display: false

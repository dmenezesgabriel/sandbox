title: 'Portable BI Dashboard'
subtitle: 'Your Data, Any Data, Instantly Explained'

dataSourceSlugs:
  - superstore-sales
  - superstore-customers
  - superstore-products

askData:
  enabled: true
  locale: 'auto'
  locales:
    supported: ['en-US', 'pt-BR']
    fallback: 'en-US'
  defaultQuestion: 'sales by region'
  maxRows: 25
  maxDimensions: 2
  maxMetrics: 1
  inferRelationships: true
  autoSemanticModeling: true
  autoNarratives: true
  semanticMatching:
    enabled: true
    model: 'onnx-community/all-MiniLM-L6-v2-ONNX'
    dtype: 'q4'
    minScore: 0.42
    minMargin: 0.04
    batchSize: 16
  profiling:
    maxDistinctValuesPerField: 100
    maxSampleRows: 1000
  relationshipInference:
    autoAcceptThreshold: 0.85
    ambiguousThreshold: 0.6
    sampleSize: 1000
  defaultMetric:
    table: sales
    column: Sales
    aggregation: SUM
  chartCapabilities:
    kpi: true
    table: true
    bar: true
    line: true
    area: true
    pie: true
    donut: true
    scatter: true
    bubble: true
    histogram: true
  fields:
    - table: sales
      column: Sales
      role: measure
      aggregation: SUM
      label: Sales
      labels:
        pt-BR: Vendas
      synonyms: ['revenue', 'amount', 'total sales']
      localizedSynonyms:
        pt-BR: ['vendas', 'receita', 'faturamento', 'valor']
      description: 'Monetary order value used for revenue, income, turnover and money questions.'
      format: currency
      default: true
      priority: 20
    - table: sales
      column: Order Date
      role: time
      label: Order Date
      labels:
        pt-BR: Data do Pedido
      synonyms: ['date', 'time', 'month', 'year', 'over time', 'order time']
      localizedSynonyms:
        pt-BR: ['data', 'tempo', 'mes', 'mês', 'ano', 'data do pedido']
      description: 'Date when the customer order was placed; use for calendar periods, trends and time series.'
      parseFormat: '%d-%m-%Y'
      default: true
      priority: 10
    - table: sales
      column: Ship Date
      role: time
      label: Ship Date
      synonyms: ['ship date', 'shipping date']
      description: 'Date when the order was shipped to the customer.'
      parseFormat: '%d-%m-%Y'
    - table: customer
      column: Region
      role: dimension
      label: Region
      labels:
        pt-BR: Região
      synonyms: ['area', 'territory']
      localizedSynonyms:
        pt-BR: ['regiao', 'região', 'area', 'área', 'territorio', 'território']
      description: 'Geographic sales region or market area.'
      priority: 10
    - table: customer
      column: Segment
      role: dimension
      label: Segment
      labels:
        pt-BR: Segmento
      synonyms: ['customer type', 'customer group', 'customer groups', 'market segment']
      localizedSynonyms:
        pt-BR: ['segmento', 'tipo de cliente']
      description: 'Customer group or market segment classification.'
      priority: 8
    - table: product
      column: Category
      role: dimension
      label: Category
      labels:
        pt-BR: Categoria
      synonyms: ['product category']
      localizedSynonyms:
        pt-BR: ['categoria', 'categoria de produto']
      description: 'High-level product grouping.'
      priority: 9
    - table: product
      column: Sub-Category
      role: dimension
      label: Sub-Category
      synonyms: ['subcategory', 'sub category']
      description: 'More detailed product grouping inside a category.'
      priority: 7
    - table: product
      column: Product Name
      role: dimension
      label: Product
      labels:
        pt-BR: Produto
      synonyms: ['product', 'item', 'product name']
      localizedSynonyms:
        pt-BR: ['produto', 'produtos', 'item', 'itens', 'nome do produto']
      description: 'Individual product or item name.'
      priority: 10
  entities:
    - label: Customers
      labels:
        pt-BR: Clientes
      singular: customer
      table: customer
      key: Customer ID
      synonyms: ['clients', 'buyers']
      localizedTerms:
        pt-BR: ['cliente', 'clientes']
      preferredDimensions: ['Segment']
    - label: Orders
      labels:
        pt-BR: Pedidos
      singular: order
      table: sales
      key: Order ID
      synonyms: ['purchases']
      localizedTerms:
        pt-BR: ['pedido', 'pedidos', 'compras']
    - label: Products
      labels:
        pt-BR: Produtos
      singular: product
      table: product
      key: Product ID
      synonyms: ['items']
      localizedTerms:
        pt-BR: ['produto', 'produtos', 'itens']
  examples:
    - 'sales by region'
    - 'top 10 products by sales'
    - 'sales over time'
    - 'sales by category in west'
    - 'count customers by segment'

filters:
  - field: Region
    label: Region
    source:
      table: customer
      column: Region
    type: select
  - field: Category
    label: Category
    source:
      table: product
      column: Category
    type: select

kpis:
  - id: total-sales
    title: Total Sales
    query: 'SELECT SUM(Sales) AS value FROM sales JOIN customer USING("Customer ID") WHERE --filter:Region--'
    format: currency
  - id: total-customers
    title: Total Customers
    query: 'SELECT COUNT(DISTINCT "Customer ID") AS value FROM customer WHERE --filter:Region--'
  - id: categories
    title: Categories
    query: 'SELECT COUNT(DISTINCT Category) AS value FROM product WHERE --filter:Category--'
  - id: top-region
    title: Top Region
    query: 'SELECT Region AS value FROM (SELECT Region, SUM(Sales) as s FROM sales JOIN customer USING("Customer ID") WHERE --filter:Region-- GROUP BY Region ORDER BY s DESC LIMIT 1)'

charts:
  - id: top10-bar
    type: bar
    query: >
      SELECT c.Region || ' / ' || p.Category AS label, SUM(s.Sales) AS value
      FROM sales s JOIN customer c ON s."Customer ID"=c."Customer ID"
      JOIN product p ON s."Product ID"=p."Product ID"
      WHERE --filter:Region-- AND --filter:Category--
      GROUP BY c.Region, p.Category ORDER BY value DESC LIMIT 10
    options:
      aspectRatio: 1.7
      plugins:
        legend:
          display: false
    section: viz
  - id: region-pie
    type: pie
    query: 'SELECT Region AS label, SUM(Sales) AS value FROM sales JOIN customer USING("Customer ID") WHERE --filter:Region-- GROUP BY Region'
    options:
      aspectRatio: 1.3
      plugins:
        legend:
          position: bottom
    section: viz

tables:
  - id: combo-table
    title: Top Region/Category Combinations
    query: >
      SELECT c.Region, p.Category, SUM(s.Sales) AS Sales
      FROM sales s JOIN customer c ON s."Customer ID"=c."Customer ID"
      JOIN product p ON s."Product ID"=p."Product ID"
      WHERE --filter:Region-- AND --filter:Category--
      GROUP BY c.Region, p.Category ORDER BY Sales DESC LIMIT 20
    columns:
      - Region
      - Category
      - Sales
    columnFormats:
      Sales: currency

